apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: infra-control
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/instance: "main"
    gethomepage.dev/name: "Headlamp"
    gethomepage.dev/description: "Kubernetes Dashboard"
    gethomepage.dev/group: "Home & Tools"
    gethomepage.dev/weight: "10"
    gethomepage.dev/icon: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/kubernetes-dashboard.png"
    gethomepage.dev/href: "http://headlamp.talos00"
    gethomepage.dev/siteMonitor: "http://headlamp.infra-control.svc.cluster.local:80"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`headlamp.talos00`)
      kind: Rule
      services:
        - name: headlamp
          port: 80
