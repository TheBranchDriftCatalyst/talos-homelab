apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: goldilocks
  namespace: infra-control
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Goldilocks"
    gethomepage.dev/description: "Resource Recommendations"
    gethomepage.dev/group: "Home & Tools"
    gethomepage.dev/weight: "11"
    gethomepage.dev/icon: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/goldilocks.png"
    gethomepage.dev/href: "http://goldilocks.talos00"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`goldilocks.talos00`)
      kind: Rule
      services:
        - name: goldilocks-dashboard
          port: 80
