---
# Velero - Kubernetes Backup & Disaster Recovery
# Docs: https://velero.io/docs/
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vmware-tanzu
  namespace: backup
spec:
  interval: 1h
  url: https://vmware-tanzu.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: backup
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: '11.2.0'
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: backup
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
    cleanupOnFail: true
  values:
    # Disable internal CRD upgrade job (Flux handles CRDs)
    upgradeCRDs: false

    # AWS plugin for S3-compatible storage
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.11.1
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    # Use Kopia for file-system backups (replacement for Restic)
    # More efficient, better deduplication
    configuration:
      # S3-compatible storage (MinIO)
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: velero
          config:
            region: minio
            s3ForcePathStyle: "true"
            s3Url: http://minio.minio.svc.cluster.local
          credential:
            name: velero-s3-credentials
            key: cloud

      # Volume snapshot location (not using CSI snapshots)
      volumeSnapshotLocation: []

      # Use Kopia for file-system backups
      uploaderType: kopia

      # Default backup TTL
      defaultBackupTTL: 720h  # 30 days

    # Credentials for S3
    credentials:
      useSecret: true
      name: velero-s3-credentials
      secretContents:
        cloud: |
          [default]
          aws_access_key_id=minio
          aws_secret_access_key=minio123

    # Node agent (runs on each node for PVC backups)
    # MUST tolerate the control-plane taint so it can back up PVCs on
    # control-plane nodes (e.g. tempo-0 on talos00). Without this,
    # critical-data-daily backups fail with "daemonset pod not found in
    # running state in node talos00".
    deployNodeAgent: true
    nodeAgent:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

    # Velero server resources
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

    # Prometheus metrics
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: prometheus

    # Schedules for automated backups
    schedules:
      # Daily backup of app namespaces (config volumes only via annotations)
      # IMPORTANT: Only volumes with backup.velero.io/backup-volumes annotation are backed up
      # This prevents backing up massive synology-nfs media libraries (10TB+ each)
      daily-all:
        disabled: false
        schedule: "0 2 * * *"  # 2 AM daily
        useOwnerReferencesInBackup: false
        template:
          ttl: "720h"  # 30 days
          includedNamespaces:
            - media
            - media-private
            - scratch
            - home-automation
            - catalyst-llm
            - registry
            - vpn-gateway
            - authentik
          excludedResources:
            # NOTE: do NOT exclude `pods` here — Velero's opt-in fs-backup uses
            # pod annotations (backup.velero.io/backup-volumes) to discover what to
            # back up. Excluding pods breaks the entire annotation-driven fs-backup.
            - events
          storageLocation: default
          snapshotVolumes: false
          # CRITICAL: false = opt-in via pod annotations, true = backup ALL volumes
          defaultVolumesToFsBackup: false

      # Weekly full backup of infrastructure (config volumes only)
      weekly-full:
        disabled: false
        schedule: "0 3 * * 0"  # 3 AM Sunday
        useOwnerReferencesInBackup: false
        template:
          ttl: "2160h"  # 90 days
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
            - minio  # Don't backup MinIO (it IS the backup storage)
          excludedResources:
            - events
          storageLocation: default
          snapshotVolumes: false
          # CRITICAL: false = opt-in via pod annotations, true = backup ALL volumes
          defaultVolumesToFsBackup: false

      # CRITICAL DATA: daily fs-backup of authentik DB + grafana/monitoring config.
      # Created in response to UPS-2026-05-09 outage which lost
      # authentik/data-authentik-postgresql-0 (total state loss) and
      # monitoring/grafana-pvc.
      #
      # Unlike daily-all (opt-in via pod annotations), this schedule sets
      # defaultVolumesToFsBackup: true so EVERY PVC in scope is backed up
      # without requiring per-pod annotations on upstream Helm charts we
      # don't control (authentik, kube-prometheus-stack, grafana-operator).
      #
      # Loki is excluded by the velero-loki-exclude-labeler Job
      # (loki-backup-exclude.yaml), which labels loki PVCs/pods with
      # `velero.io/exclude-from-backup=true`. Its log/chunk volume is
      # ephemeral cache (real logs go to MinIO via S3 backend) and would
      # bloat backups with churny data we don't need.
      critical-data-daily:
        disabled: false
        schedule: "30 2 * * *"  # 2:30 AM daily (after daily-all kicks off)
        useOwnerReferencesInBackup: false
        template:
          ttl: "720h"  # 30 days
          includedNamespaces:
            - authentik       # data-authentik-postgresql-0 (auth state for everything)
            - monitoring      # grafana-pvc, mimir-* (loki excluded via label)
            - cilium-spire    # spire-data-spire-server-0 (SPIFFE identity DB) — added TALOS-aq0
            - dungeon-library # postgres-storage-postgres-0 — added TALOS-aq0
          excludedResources:
            - events
          storageLocation: default
          snapshotVolumes: false
          # CRITICAL: backup ALL volumes in these namespaces by default.
          # local-path-provisioner does not support CSI snapshots, so we
          # rely on Kopia fs-backup via the node-agent DaemonSet.
          #
          # Loki is excluded by labeling the loki PVC and StatefulSet
          # pods with `velero.io/exclude-from-backup=true` — see
          # loki-backup-exclude.yaml. (labelSelector here would also
          # filter out unlabeled k8s resources we DO want backed up.)
          defaultVolumesToFsBackup: true
