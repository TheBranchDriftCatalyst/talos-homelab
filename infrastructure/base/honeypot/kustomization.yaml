---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: honeypot

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - cilium-network-policy.yaml
  # pvc.yaml removed — honeypot state is ephemeral, durable data goes
  # out via the jsonlog output plugin and Mimir/Loki scraping.
  # IngressRouteTCP removed — using hostPort for raw TCP (SSH/Telnet)
