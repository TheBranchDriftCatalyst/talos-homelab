---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cowrie-config
  namespace: honeypot
data:
  cowrie.cfg: |
    # Cowrie SSH/Telnet Honeypot Configuration
    # https://cowrie.readthedocs.io/en/latest/

    [honeypot]
    # Hostname the honeypot will pretend to be
    hostname = srv01

    # Directory where downloads will be stored
    download_path = /cowrie/var/lib/cowrie/downloads

    # Fake filesystem
    filesystem = /cowrie/share/cowrie/fs.pickle

    # Contents to log
    contents_path = /cowrie/var/lib/cowrie/tty

    # Log path
    log_path = /cowrie/var/log/cowrie

    # Timezone
    timezone = UTC

    # Interaction timeout (seconds)
    interact_timeout = 180

    # Command execution timeout
    exec_enabled = true

    [ssh]
    enabled = true
    listen_endpoints = tcp:2222:interface=0.0.0.0
    version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.1

    [telnet]
    enabled = true
    listen_endpoints = tcp:2223:interface=0.0.0.0

    [output_jsonlog]
    enabled = true
    logfile = /cowrie/var/log/cowrie/cowrie.json
    epoch_timestamp = false

    [output_textlog]
    enabled = true
    logfile = /cowrie/var/log/cowrie/cowrie.log
