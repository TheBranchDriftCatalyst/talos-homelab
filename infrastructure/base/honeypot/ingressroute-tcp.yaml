---
# TCP IngressRoute for Cowrie SSH
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: cowrie-ssh
  namespace: honeypot
  labels:
    app: cowrie
spec:
  entryPoints:
    - cowrie-ssh
  routes:
    - match: HostSNI(`*`)
      services:
        - name: cowrie
          port: 2222
---
# TCP IngressRoute for Cowrie Telnet
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: cowrie-telnet
  namespace: honeypot
  labels:
    app: cowrie
spec:
  entryPoints:
    - cowrie-telnet
  routes:
    - match: HostSNI(`*`)
      services:
        - name: cowrie
          port: 2223
