---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-arr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: homelab
spec:
  project: default
  source:
    repoURL: https://github.com/TheBranchDriftCatalyst/gateway-arr.git
    targetRevision: main
    path: config/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-arr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
