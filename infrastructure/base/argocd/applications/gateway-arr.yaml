---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-arr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: homelab
spec:
  project: default
  source:
    repoURL: https://github.com/TheBranchDriftCatalyst/gateway-arr.git
    targetRevision: main
    path: config/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-arr
  # The ESO controller fills in three default fields on every
  # ExternalSecret (`data[].remoteRef.conversionStrategy`,
  # `.decodingStrategy`, `.metadataPolicy`) that aren't in git, which
  # ArgoCD flags as permanent drift even though the resources report
  # SecretSynced=True. These objects have no managedFields metadata
  # (they're created via client-side apply), so `managedFieldsManagers`
  # doesn't help — match the three subkeys explicitly with jq pointers.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
