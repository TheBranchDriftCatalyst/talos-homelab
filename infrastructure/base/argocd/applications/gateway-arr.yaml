---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-arr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: homelab
spec:
  project: default
  source:
    repoURL: https://github.com/TheBranchDriftCatalyst/gateway-arr.git
    targetRevision: main
    path: config/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-arr
  # The ESO controller fills in three default fields on every
  # ExternalSecret (`data[].remoteRef.conversionStrategy`,
  # `.decodingStrategy`, `.metadataPolicy`) with its own field manager,
  # which ArgoCD then flags as permanent drift even though they're just
  # controller-provided defaults. Ignore fields owned by the
  # external-secrets field manager on this CRD; ArgoCD still compares
  # everything our manifests declare.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      managedFieldsManagers:
        - external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
