---
# ArgoCD Application for arr-stack-private
#
# Copy this file to: talos-homelab/infrastructure/base/argocd/applications/arr-stack-private.yaml
#
# This is the ONLY thing that needs to be added to talos-homelab.
# All configuration (IPs, domains, etc) is in this repo's base/cluster-config.yaml
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-stack-private
  namespace: argocd
  labels:
    app.kubernetes.io/name: arr-stack-private
    app.kubernetes.io/part-of: arr-stack
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:TheBranchDriftCatalyst/private.git
    targetRevision: main
    path: .  # Root kustomization combines base/ + tdarr-patches/

  destination:
    server: https://kubernetes.default.svc
    namespace: media

  # The ESO controller populates three default subkeys on every
  # ExternalSecret (`data[].remoteRef.conversionStrategy`,
  # `.decodingStrategy`, `.metadataPolicy`) that aren't in git, which
  # ArgoCD flags as drift even though the ESes are SecretSynced=True.
  # Match the three subkeys with jq pointers so ArgoCD stops
  # complaining about the controller's own bookkeeping.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=false  # media namespace already exists from arr-stack
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true  # Needed for cluster-scoped PVs

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
