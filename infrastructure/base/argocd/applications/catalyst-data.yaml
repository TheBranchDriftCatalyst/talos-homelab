apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalyst-data
  namespace: argocd
  labels:
    app.kubernetes.io/name: catalyst-data
    app.kubernetes.io/part-of: catalyst
  annotations:
    argocd-image-updater.argoproj.io/image-list: >-
      congress=ghcr.io/thebranchdriftcatalyst/congress-data,
      media=ghcr.io/thebranchdriftcatalyst/media-ingest,
      leaks=ghcr.io/thebranchdriftcatalyst/open-leaks,
      kg-api=ghcr.io/thebranchdriftcatalyst/knowledge-graph-api
    argocd-image-updater.argoproj.io/congress.update-strategy: latest
    argocd-image-updater.argoproj.io/media.update-strategy: latest
    argocd-image-updater.argoproj.io/leaks.update-strategy: latest
    argocd-image-updater.argoproj.io/kg-api.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  info:
    - name: GitHub Repository
      value: https://github.com/TheBranchDriftCatalyst/catalyst-data
  source:
    repoURL: https://github.com/TheBranchDriftCatalyst/catalyst-data.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: catalyst-data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
