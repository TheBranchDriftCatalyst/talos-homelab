apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-video-faces
  namespace: argocd
  labels:
    app.kubernetes.io/name: immich-video-faces
    app.kubernetes.io/part-of: arr-stack-private
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  info:
    - name: GitHub Repository
      value: https://github.com/TheBranchDriftCatalyst/immich-video-faces
  source:
    repoURL: https://github.com/TheBranchDriftCatalyst/immich-video-faces.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: media-private
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false  # media-private already exists (immich lives there)
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
