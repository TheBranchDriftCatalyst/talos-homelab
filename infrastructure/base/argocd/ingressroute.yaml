---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "ArgoCD"
    gethomepage.dev/description: "GitOps Continuous Delivery"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/icon: "argocd.png"
    gethomepage.dev/href: "http://argocd.talos00"
    gethomepage.dev/siteMonitor: "http://argocd-server.argocd.svc.cluster.local"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.talos00`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80
