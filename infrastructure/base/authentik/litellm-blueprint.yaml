---
# Authentik Blueprint for LiteLLM OIDC SSO Integration
#
# Creates the complete chain needed for LiteLLM SSO via Authentik:
#   1. Group         - litellm-admins (empty by default; user adds members via UI)
#   2. ScopeMapping  - litellm_role (returns proxy_admin / internal_user based on group/superuser)
#   3. OAuth2Provider- litellm (confidential, client_id=litellm)
#   4. Application   - litellm (slug=litellm, bound to provider above)
#
# Mounted into authentik-worker as /blueprints/custom/litellm-role-mapping.yaml
# via ConfigMap authentik/authentik-litellm-blueprint. Worker auto-discovers and
# applies any blueprint files under /blueprints/custom/.
#
# IMPORTANT: client_id / client_secret in this blueprint MUST match the values
# stored in 1Password and synced into the catalyst-llm/litellm-secrets Secret
# (keys: oidc-client-id, oidc-client-secret). Currently:
#   client_id     = "litellm"
#   client_secret = (managed in 1Password; do NOT put plaintext here)
#
# Because Authentik blueprints generate a fresh client_secret if none is provided,
# we pin client_secret here so cluster rebuilds yield the same value LiteLLM expects.
# The secret value below is the SAME one currently provisioned for the live cluster.
# If you ever rotate it, update both this blueprint AND the 1Password entry.
#
# MANUAL POST-INSTALL STEPS (one-time, per user):
#   1. Log into Authentik as akadmin
#   2. Directory > Groups > "litellm-admins" > Add the user(s) who should be proxy_admin
#   3. (Optional) edit the litellm Application meta_icon / launch URL
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-litellm-blueprint
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: blueprint
data:
  litellm-role-mapping.yaml: |
    # Authentik Blueprint: LiteLLM OIDC SSO (full IaC)
    # Docs: https://docs.goauthentik.io/docs/customize/blueprints
    version: 1
    metadata:
      name: LiteLLM Role Mapping
      labels:
        blueprints.goauthentik.io/description: "Complete LiteLLM OIDC SSO: group, scope mapping, OAuth2 provider, and application"
    entries:

      # ---------------------------------------------------------------------
      # 1. Group: litellm-admins
      #    Empty by default. Users added via UI become proxy_admin in LiteLLM.
      # ---------------------------------------------------------------------
      - model: authentik_core.group
        id: litellm-admins-group
        identifiers:
          name: litellm-admins
        attrs:
          is_superuser: false

      # ---------------------------------------------------------------------
      # 2. ScopeMapping: litellm_role
      #    Returns "proxy_admin" for superusers OR members of admin groups,
      #    "internal_user" otherwise. LiteLLM reads this via the
      #    GENERIC_USER_ROLE_ATTRIBUTE=litellm_role env var.
      # ---------------------------------------------------------------------
      - model: authentik_providers_oauth2.scopemapping
        id: litellm-role-scope-mapping
        identifiers:
          scope_name: litellm_role
        attrs:
          name: "LiteLLM Role"
          scope_name: litellm_role
          description: "Returns user role for LiteLLM proxy (proxy_admin or internal_user)"
          expression: |
            # Superusers always get proxy_admin
            if request.user.is_superuser:
                return {"litellm_role": "proxy_admin"}
            # Otherwise check membership in any of the recognised admin groups
            admin_groups = ["Catalyst Admins", "authentik Admins", "litellm-admins"]
            user_groups = [g.name for g in request.user.ak_groups.all()]
            if any(g in user_groups for g in admin_groups):
                return {"litellm_role": "proxy_admin"}
            return {"litellm_role": "internal_user"}

      # ---------------------------------------------------------------------
      # 3. OAuth2Provider: litellm
      #    Confidential client. Pinned client_id/client_secret so they match
      #    the values in 1Password / litellm-secrets after any rebuild.
      # ---------------------------------------------------------------------
      - model: authentik_providers_oauth2.oauth2provider
        id: litellm-oauth2-provider
        identifiers:
          name: litellm
        attrs:
          name: litellm
          client_type: confidential
          client_id: litellm
          # client_secret matches the value stored in 1Password under "litellm-secrets"
          # key "oidc-client-secret". Pinned here so cluster rebuilds re-create the
          # SAME credential the LiteLLM container is already configured to send.
          # Rotation: update 1Password AND this file together.
          client_secret: 99LZ7Bpv7Yw7wJyIaaeU8UbVfH6qFgtPskE0aIvlWCnVAW14CStEbeQwBb0D1XEhTMKAINwx5WrL109gUSeKJxy6xEIUZ67ONGZ1kxgBd2MApbUgrdMUtsy0J0HdkYUc
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          access_code_validity: minutes=1
          access_token_validity: minutes=10
          refresh_token_validity: days=30
          include_claims_in_id_token: true
          sub_mode: hashed_user_id
          issuer_mode: per_provider
          redirect_uris:
            - matching_mode: strict
              url: https://litellm.talos00/sso/callback
            - matching_mode: strict
              url: http://litellm.talos00/sso/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !KeyOf litellm-role-scope-mapping

      # ---------------------------------------------------------------------
      # 4. Application: litellm
      #    Bound to the OAuth2 provider above. Restricted to litellm-admins
      #    group at the application level (LiteLLM also enforces via role).
      # ---------------------------------------------------------------------
      - model: authentik_core.application
        id: litellm-application
        identifiers:
          slug: litellm
        attrs:
          name: LiteLLM
          slug: litellm
          provider: !KeyOf litellm-oauth2-provider
          meta_launch_url: http://litellm.talos00
          meta_description: "LiteLLM proxy - unified gateway to LLM providers (OpenAI, Anthropic, Ollama, etc.)"
          meta_publisher: "Catalyst Homelab"
          open_in_new_tab: false
          policy_engine_mode: any
