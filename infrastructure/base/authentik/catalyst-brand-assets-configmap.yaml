---
# Brand assets for the catalyst (default) Authentik brand.
#
# Mounted into the authentik-server pod at /web/dist/catalyst-brand-<file>
# (see helmrelease.yaml), which Authentik serves under
# /static/dist/catalyst-brand-<file>. The brand entry in
# catalyst-brand-blueprint.yaml references them by that URL.
#
# REPLACING THE PLACEHOLDERS:
#   base64 -i /path/to/catalyst-brand-logo.svg     | pbcopy
#   base64 -i /path/to/catalyst-brand-favicon.svg  | pbcopy
#
#   (PNG/ICO favicons also work — Authentik serves whatever bytes you give
#   it. If you switch formats, also update branding_favicon in
#   catalyst-brand-blueprint.yaml to match the new extension.)
#
# RECOMMENDED ASSET SIZES (Authentik renders logo at ~100px tall on the
# login card, ~32px in the masthead; favicon at 16/32/48px):
#   logo.svg     — SVG vector, ~3:1 or 4:1 wide, transparent bg, 2–30 KB
#                  PNG fallback: 600x150, transparent bg, ≤100 KB
#   favicon.svg  — SVG vector, 1:1 square, 1–5 KB
#                  ICO/PNG fallback: 64x64 or 128x128, ≤10 KB
#
# HARD LIMIT: A ConfigMap can hold at most ~1 MiB total. Base64 inflates
# bytes by ~33%, so the raw-file budget across both keys is roughly 768 KB.
# Use SVG wherever you can — vectors are kilobytes, never hit the cap, and
# stay crisp at every DPI. If you add a login background image, put it in
# its own ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-catalyst-brand-assets
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: brand-assets
    brand: catalyst
binaryData:
  # TODO: replace with the real catalyst logo
  catalyst-brand-logo.svg: 
  # TODO: replace with the real catalyst favicon
  catalyst-brand-favicon.svg: 
