---
# ExternalSecret to pull deSEC API token for DNS-01 challenges in cert-manager.
# Sourced from the same 1Password item used by external-dns (key: desec-dns).
# The webhook (cert-manager-webhook-desec) is granted read access to a secret
# named exactly "desec-api-token" via its chart values (secretName: [...]).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: desec-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: desec-api-token
    creationPolicy: Owner
  data:
    - secretKey: DESEC_TOKEN
      remoteRef:
        key: desec-dns
        property: password
