---
# Wildcard certificate for *.kelsboi.dedyn.io (deSEC zone)
# Stored in traefik namespace for ingress use as a default certificate via SNI.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kelsboi-wildcard
  namespace: traefik
spec:
  secretName: kelsboi-wildcard-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  # Wildcard + apex domain
  dnsNames:
    - "*.kelsboi.dedyn.io"
    - "kelsboi.dedyn.io"
  # Certificate duration and renewal
  duration: 2160h # 90 days
  renewBefore: 720h # 30 days before expiry
