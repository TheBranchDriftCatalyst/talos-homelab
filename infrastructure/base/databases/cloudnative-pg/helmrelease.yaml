---
# CloudNativePG Operator
# Provides: Cluster, Backup, ScheduledBackup, Pooler CRDs
# Docs: https://cloudnative-pg.io/documentation/
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
  namespace: databases
spec:
  interval: 1h
  url: https://cloudnative-pg.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: databases
spec:
  interval: 30m
  chart:
    spec:
      chart: cloudnative-pg
      version: '0.22.1'
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: databases
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Operator configuration
    replicaCount: 1

    # Resources for homelab
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

    # Monitoring - enable Prometheus metrics
    monitoring:
      podMonitorEnabled: true
      grafanaDashboard:
        create: true
        namespace: monitoring

    # Config - watch all namespaces for Cluster CRs
    config:
      create: true
      data:
        # Enable inherited annotations/labels on managed resources
        INHERITED_ANNOTATIONS: "app.kubernetes.io/*"
        INHERITED_LABELS: "app.kubernetes.io/*"

    # Webhook failurePolicy=Ignore — TALOS-9cf permanent fix (2026-05-29).
    # Default is Fail. When cnpg-operator is unhealthy (it's been showing
    # 3000+ restarts/week as a downstream effect of the 2026-05-29 cilium
    # meltdowns), every pod create/update CLUSTER-WIDE stalls 10s × 7
    # cnpg webhooks waiting for them to time out. Even non-database
    # workloads (plex, arr, argocd) get caught because Pod admission
    # itself hits these.
    #
    # Trade-off accepted: if cnpg-operator is down AND someone creates a
    # Cluster/Backup/Pooler CR, the CR is admitted without validation.
    # Local impact (malformed cnpg CR doesn't reconcile correctly).
    # Versus Fail: cluster-wide pod admission stall (global impact).
    #
    # Real fix: HA control plane (TALOS-arx) → cnpg-operator stops
    # crashing → webhooks stay healthy → could revert to Fail. This
    # Ignore is the short-term safety belt.
    #
    # Live-patched 2026-05-29 via `kubectl patch` and surprisingly stuck
    # (operator was crash-looping too fast to reconcile and revert) but
    # this CR setting is the permanent declarative source of truth.
    webhook:
      mutating:
        create: true
        failurePolicy: Ignore
      validating:
        create: true
        failurePolicy: Ignore
