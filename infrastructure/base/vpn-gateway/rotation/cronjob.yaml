---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vpn-rotator
  namespace: vpn-gateway
  labels:
    app.kubernetes.io/name: vpn-rotator
    app.kubernetes.io/component: cronjob
spec:
  # Run every 35 minutes (script adds 0-10 min jitter = ~40 min effective)
  schedule: "*/35 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      # A stuck rotate.py (or hung `apk add` during Python install) must
      # NOT wedge the schedule forever — concurrencyPolicy: Forbid means
      # one stuck job blocks all subsequent windows. 25 min < the 35 min
      # cron interval, so a wedged job dies before the next fire. See
      # TALOS-r22 (2026-07-21) for the 54-day apk-hang that motivated this.
      activeDeadlineSeconds: 1500
      template:
        metadata:
          labels:
            app.kubernetes.io/name: vpn-rotator
            app.kubernetes.io/component: job
        spec:
          serviceAccountName: vpn-rotator
          restartPolicy: OnFailure
          containers:
            - name: rotator
              # alpine/k8s bundles kubectl, helm, python3, jq, and yq — no
              # runtime `apk add` needed. Previous `dtzar/helm-kubectl:latest`
              # forced `apk add python3` at start; a single failed apk fetch
              # wedged the job forever (TALOS-r22 — 54-day hang until 07-21).
              # Pin the tag to match cluster k8s minor (v1.34.x).
              image: alpine/k8s:1.34.9
              command:
                - python3
                - /scripts/rotate.py
              env:
                - name: VPN_ROTATION_MODE
                  valueFrom:
                    configMapKeyRef:
                      name: vpn-rotator-config
                      key: rotation_mode
                      optional: true
                - name: VPN_ROTATION_STAGGER_DELAY
                  valueFrom:
                    configMapKeyRef:
                      name: vpn-rotator-config
                      key: stagger_delay
                      optional: true
                - name: VPN_ROTATION_JITTER_MAX
                  valueFrom:
                    configMapKeyRef:
                      name: vpn-rotator-config
                      key: jitter_max
                      optional: true
                - name: BLUE_GREEN_WAIT_TIMEOUT
                  valueFrom:
                    configMapKeyRef:
                      name: vpn-rotator-config
                      key: blue_green_wait_timeout
                      optional: true
                - name: PUSHGATEWAY_URL
                  value: "http://pushgateway.monitoring:9091/metrics/job/vpn-rotator"
                - name: DRY_RUN
                  valueFrom:
                    configMapKeyRef:
                      name: vpn-rotator-config
                      key: dry_run
                      optional: true
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
                - name: secrets
                  mountPath: /secrets
                  readOnly: true
                - name: state
                  mountPath: /state
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
          volumes:
            - name: script
              configMap:
                name: vpn-rotator-script
                defaultMode: 0755
            - name: secrets
              secret:
                secretName: protonvpn-credentials
            - name: state
              persistentVolumeClaim:
                claimName: vpn-rotator-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vpn-rotator-state
  namespace: vpn-gateway
  labels:
    app.kubernetes.io/name: vpn-rotator
    app.kubernetes.io/component: state
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Mi
  storageClassName: local-path
