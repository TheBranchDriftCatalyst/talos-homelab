---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-dns

resources:
  # namespace.yaml intentionally NOT included — the namespace is owned by
  # infrastructure/base/namespaces/external-dns.yaml (which carries the
  # PSA enforce=privileged labels needed by the desec-ddns gluetun sidecar).
  # Including it here caused an ownership tug-of-war that wiped the PSA
  # labels and blocked Pod creation (TALOS-q1a).
  # - namespace.yaml
  - dnsendpoint-crd.yaml
  - externalsecret.yaml
  - rbac.yaml
  - deployment.yaml
  - servicemonitor.yaml
  - dnsendpoints.yaml
