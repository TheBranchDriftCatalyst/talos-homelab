---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Note: no kustomization-level `namespace:` set. Each resource has its own
# explicit namespace (kubevirt or monitoring) and the operator manifest spans
# multiple namespaces and cluster-scoped objects.
resources:
  # KubeVirt operator install (v1.4.0)
  - namespace.yaml
  - operator.yaml
  - cr.yaml
  # Monitoring resources for the running KubeVirt install
  - servicemonitor.yaml
  - prometheusrule.yaml
