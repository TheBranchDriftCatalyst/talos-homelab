---
# KubeVirt operator install. Owned by the kubevirt Flux Kustomization
# (clusters/catalyst-cluster/kubevirt.yaml).
#
# Monitoring resources (ServiceMonitor + PrometheusRule) live in ./monitoring/
# and are included by infrastructure/base/monitoring/v2-otel/kustomization.yaml.
# Splitting prevents the monitoring Flux Kustomization from re-applying the
# operator/CR (which would conflict with this Kustomization's ownership).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - operator.yaml
  - cr.yaml
