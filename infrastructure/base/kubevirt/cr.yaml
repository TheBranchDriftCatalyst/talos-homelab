---
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  certificateRotateStrategy: {}
  configuration:
    developerConfiguration:
      featureGates: []
  # 2026-05-30: removed the customizeComponents.patches that forced all
  # virt-api admission webhooks to failurePolicy=Ignore. The original
  # rationale (virt-operator crashlooping → Fail webhooks stalled cluster-
  # wide pod admission) was downstream of TALOS-yyt (CiliumIdentity bloat).
  # With the meltdown cascade fixed, virt-api is stable and Fail is correct:
  # bad VirtualMachine CRs SHOULD be rejected at admission, not silently
  # accepted. virt-operator reconciles the webhooks back to KubeVirt's
  # built-in defaults.
  imagePullPolicy: IfNotPresent
  workloadUpdateStrategy: {}
