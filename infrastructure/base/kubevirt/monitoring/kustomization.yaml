---
# KubeVirt monitoring resources (ServiceMonitor + PrometheusRule).
# Lives separately from the operator install so the monitoring Kustomization
# can include only these without re-applying the operator (which the kubevirt
# Flux Kustomization owns).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - servicemonitor.yaml
  - prometheusrule.yaml
