---
# Cilium CNI — INFRA, Flux-managed (TALOS-ocj, activated 2026-05-30).
#
# Activated after TALOS-yyt root-cause fix (identity bloat → etcd
# saturation → meltdown cascade). With the cascade eliminated, the
# DS-rollout-during-take-ownership risk that bricked the cluster on
# 2026-05-29 is no longer present: helm release name matches the existing
# manual install, so helm-controller adopts without take-ownership churn.
#
# Per the dual-GitOps demarcation (docs/02-architecture/dual-gitops.md):
#   Flux = infrastructure (CNI, ingress, storage, observability, operators)
#   ArgoCD = applications only (plex, arr stack, catalyst-ui, etc.)
# Cilium is CNI. It belongs in Flux. (Confirmed by user 2026-05-29.)
#
# Bootstrap chicken-and-egg:
#   Cilium IS the CNI. Flux needs network. Network needs Cilium.
#   Solution: bootstrap Cilium manually once with helm template + kubectl apply
#   on a fresh cluster, then this HelmRelease takes over future reconciliation.
#   On an existing cluster: `helm upgrade --install cilium cilium/cilium
#   --version 1.16.6 -f infrastructure/base/cilium/values.yaml -n kube-system
#   --take-ownership` once to seed the helm release secret, then Flux adopts.
#
# Values live next to this file (`values.yaml`) and are mounted via a
# kustomize-generated ConfigMap (`cilium-values`) referenced by valuesFrom
# below. This keeps the values readable as a regular YAML file editable in
# any IDE, without inlining the 280+ line block into the HelmRelease.
#
# CRITICAL: prune is intentionally FALSE on the Flux Kustomization that
# owns this file (see clusters/catalyst-cluster/cilium.yaml). NEVER let
# Flux auto-prune the CNI — a misconfiguration could delete every
# Cilium-related resource and brick the cluster.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h
  url: https://helm.cilium.io/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  # Match the release name used by the historical manual install so the
  # existing helm release secret (created by --take-ownership) is found.
  releaseName: cilium
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: '1.16.6'
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: cilium-values
      valuesKey: values.yaml
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
    # Force replacement of immutable fields (e.g. Service spec changes).
    # Cilium upgrades occasionally need this when chart versions bump
    # selector labels.
    force: false
    cleanupOnFail: false
  # Don't wait for the rollout — Cilium DS restart can take 5+ minutes
  # per the maxUnavailable: 1 + agent startup time. Flux would otherwise
  # mark the reconcile as failed and retry, compounding API pressure.
  test:
    enable: false

  # The Cilium chart creates the cilium-spire namespace WITHOUT
  # pod-security.kubernetes.io labels. The cluster's baseline PSA enforce
  # then blocks SPIRE pods (hostNetwork, hostPID, hostPath are required for
  # SPIRE agent's UDS). 2026-05-30: first Flux adoption of Cilium tripped
  # this — SPIRE pods 0/desired for 15 min, helm timed out waiting.
  #
  # Strategic-merge patch below adds the PSA labels to the chart-rendered
  # namespace. (Prior JSON patch with `op: add` failed silently for weeks:
  # the rendered ns has no `metadata.labels` at all, so `add` at
  # `/metadata/labels/<key>` fails with "doc is missing path" and helm-
  # controller aborts the entire postRender. The standalone
  # spire-namespace.yaml in kustomization.yaml has been quietly doing all
  # the work; SMP restores the belt-and-suspenders intent.)
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Namespace
              name: cilium-spire
            patch: |
              apiVersion: v1
              kind: Namespace
              metadata:
                name: cilium-spire
                labels:
                  pod-security.kubernetes.io/enforce: privileged
                  pod-security.kubernetes.io/warn: privileged
          # Raise spire-agent's projected SA token TTL from Cilium's hardcoded
          # 600s → 3600s. The 10-min TTL is too short for kubelet's TokenManager
          # to reliably refresh once a pod enters CrashLoopBackOff: the refresh
          # bookkeeping wedges and every subsequent container-restart reads an
          # already-expired token from tmpfs → apiserver rejects via TokenReview
          # → the pod loops forever. Observed on talos01 (2500+ restarts) while
          # the same DaemonSet on the other 4 nodes stayed healthy.
          # The `op: test` guard fails loudly if a Cilium chart bump reorders
          # the volumes array.
          - target:
              kind: DaemonSet
              name: spire-agent
              namespace: cilium-spire
            patch: |
              - op: test
                path: /spec/template/spec/volumes/3/projected/sources/0/serviceAccountToken/audience
                value: spire-server
              - op: replace
                path: /spec/template/spec/volumes/3/projected/sources/0/serviceAccountToken/expirationSeconds
                value: 3600
