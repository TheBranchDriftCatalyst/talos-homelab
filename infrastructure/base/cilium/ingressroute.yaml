---
# IngressRoute for Hubble UI - Cilium's network flow visualization
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hubble-ui
  namespace: kube-system
  labels:
    app.kubernetes.io/name: hubble-ui
    app.kubernetes.io/part-of: cilium
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/instance: "main"
    gethomepage.dev/name: "Hubble"
    gethomepage.dev/description: "Network Observability"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/weight: "20"
    gethomepage.dev/icon: "https://raw.githubusercontent.com/cilium/hubble/main/Documentation/images/hubble_logo.png"
    gethomepage.dev/href: "http://hubble.talos00"
    gethomepage.dev/siteMonitor: "http://hubble-ui.kube-system.svc.cluster.local"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`hubble.talos00`)
      kind: Rule
      services:
        - name: hubble-ui
          port: 80
