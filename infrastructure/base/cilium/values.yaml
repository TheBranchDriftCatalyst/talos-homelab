# Cilium CNI values for Talos Linux cluster
# Generated for catalyst-cluster multi-node setup

# =============================================================================
# Cluster Identity (required for ClusterMesh)
# =============================================================================
cluster:
  name: talos-home
  id: 1

# Replace kube-proxy with Cilium's eBPF implementation
kubeProxyReplacement: true

# =============================================================================
# MTU Configuration for ClusterMesh over Nebula
# =============================================================================
# Nebula TUN interface has MTU 1300 (due to WireGuard-like encapsulation)
# VXLAN tunneling adds ~50 bytes overhead
# Set MTU to 1250 to prevent fragmentation when tunneling over Nebula
MTU: 1250

# =============================================================================
# NodePort Configuration for Multi-Network Access
# =============================================================================
# Include both LAN and Nebula network CIDRs so NodePort services are accessible
# via both interfaces. This is required for ClusterMesh via Nebula overlay.
nodePort:
  addresses:
    - 192.168.1.0/24   # LAN network
    - 10.100.0.0/16    # Nebula overlay network

# Kubernetes API server endpoint — KubePrism (localhost:7445).
#
# 2026-05-29 correction: earlier today I claimed KubePrism wasn't listening
# based on a /proc/net/tcp grep. The grep used the WRONG hex value (`:1D1D`
# instead of `:1D15` — 7445 dec = 0x1D15). Re-verified: KubePrism IS
# listening on 127.0.0.1:7445 in LISTEN state on all 5 nodes, and the Talos
# `KubePrismStatus` resource shows HEALTHY=true.
#
# Why this matters: KubePrism is apid's userspace TCP proxy. cilium-agent
# connect(localhost:7445) → Cilium's BPF socket-LB sees no matching
# ClusterIP → pass-through → apid forwards to whichever apiserver is
# healthy. This decouples cilium-agent bootstrap from Cilium's own eBPF
# datapath, breaking the cilium#41108 chicken-and-egg that caused meltdowns
# #2-#5 on 2026-05-29: every cilium-agent restart on talos00 was failing to
# reach apiserver during the eBPF reload window. With KubePrism, the
# agent's apiserver path goes through apid (host networking, never Cilium).
k8sServiceHost: localhost
k8sServicePort: 7445

# =============================================================================
# Prometheus Metrics Configuration
# =============================================================================
# Enable Prometheus metrics for observability
# Reference: https://docs.cilium.io/en/stable/observability/metrics/

# Cilium Agent metrics (port 9962)
prometheus:
  enabled: true
  port: 9962
  serviceMonitor:
    enabled: false  # We use PodMonitor instead (no Service exists)

# Single replica for operator (can scale later)
operator:
  replicas: 1
  # Cilium Operator metrics (port 9963)
  prometheus:
    enabled: true
    port: 9963
    serviceMonitor:
      enabled: false  # We use PodMonitor instead

# Use Kubernetes IPAM (compatible with existing pod CIDR)
ipam:
  mode: kubernetes

# Hubble observability
hubble:
  enabled: true
  # Hubble flow buffer. Was 16383 (~64MiB) but the CP-pinned Cilium agent on
  # talos00 was OOM-thrashing under the combined load of Hubble + SPIRE +
  # clustermesh-apiserver against a 1GiB pod limit. Dropped to 8191 (~32MiB).
  # Must be (2^n - 1): 4095, 8191, 16383, 32767, 65535
  eventBufferCapacity: 8191
  relay:
    enabled: true
  ui:
    enabled: true
  # Hubble metrics (port 9965)
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - policy:sourceContext=app|workload-name|pod|reserved-identity;destinationContext=app|workload-name|pod|dns|reserved-identity;labelsContext=source_namespace,destination_namespace
      - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
    port: 9965
    enableOpenMetrics: true
    serviceMonitor:
      enabled: false  # We use PodMonitor instead

# Talos-specific security context
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Talos uses cgroupv2
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# =============================================================================
# DNS Proxy Configuration
# =============================================================================
# Disable transparent DNS proxy mode - Talos's hostDNS handles DNS forwarding
# The transparent proxy can't reach Talos's 127.0.0.53 from pod namespace
dnsProxy:
  enableTransparentMode: false

# Resource limits.
# memory raised 1Gi → 2Gi after 2026-05-29 meltdown. The CP-pinned agent on
# talos00 carries the heaviest endpoint map (system pods + SPIRE + Hubble Relay
# + ClusterMesh apiserver), and Go's GOMEMLIMIT was thrashing GC near the 1GiB
# ceiling. Removing the cap entirely is the Cilium-DS upstream recommendation,
# but 2Gi gives breathing room without unbounded usage.
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 256Mi

# =============================================================================
# SPIRE-based Mutual TLS Authentication
# =============================================================================
# Reference: https://docs.cilium.io/en/stable/network/servicemesh/mutual-authentication/mutual-authentication/
#
# Uses SPIRE for workload identity - WireGuard encryption is optional
# SPIRE provides mutual authentication between services via mTLS

authentication:
  mutual:
    spire:
      enabled: true
      install:
        enabled: true
        namespace: cilium-spire
        server:
          # Run SPIRE server as root to fix socket permission issues
          # SPIRE 1.10+ defaults to UID 1000 which can't write to hostPath
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          dataStorage:
            enabled: true
            storageClass: local-path
            accessMode: ReadWriteOnce
            size: 1Gi

# =============================================================================
# Egress Gateway for VPN Traffic Steering (DISABLED)
# =============================================================================
# Reference: https://docs.cilium.io/en/stable/network/egress-gateway/
#
# DISABLED: Abandoned node-level WireGuard approach due to router NAT issues.
# Now using pod-based gluetun VPN gateway instead.
# Re-enable if you need to route traffic through specific nodes/interfaces.

egressGateway:
  enabled: false

# Agent liveness — REVERTED to chart default after 2026-05-29 post-mortem.
# The 15-min grace (failureThreshold: 30) was hiding silent rot: the cluster
# accumulated 1991 cilium-agent restarts over 5 days without alerting before
# the 2026-05-29 meltdown made it obvious. Fail loud at 5min instead — pair
# with PrometheusRules on restart rate (TALOS-txl) so we hear the alarm.
#
# NOTE: chart schema expects `livenessProbe` at top level (not nested under
# `agent`). Prior `agent.livenessProbe.failureThreshold: 30` was schema-
# invalid; helm would have rejected the render. Yet the live DS had it set —
# so it was almost certainly live-patched via `kubectl edit ds cilium`
# during the 2026-05-22 incident response and never made it into rendered
# manifests. Fix the structure properly now.
livenessProbe:
  failureThreshold: 10   # chart default — 10 × 30s = 5min grace
# DaemonSet rolling update — tightened from 2 → 1 to prevent multi-agent
# downtime during agent rotation breaking apiserver host-network connectivity.
updateStrategy:
  rollingUpdate:
    maxUnavailable: 1

# BPF masquerade required for egress gateway
bpf:
  masquerade: true
  # Increase BPF policy map size — default 16384 was overflowing on talos03
  # under our identity count (~50 namespaces × policies). Error was:
  #   "Failed to add PolicyMap key: no space left on device"
  # 65536 gives headroom for further growth.
  policyMapMax: 65536
  # Also bump LB map max in proportion (was already 65536, keep for clarity)
  lbMapMax: 65536

# =============================================================================
# WireGuard Transparent Encryption (TESTING - DISABLED)
# =============================================================================
# Reference: https://docs.cilium.io/en/stable/security/network/encryption-wireguard/
#
# ISSUE: WireGuard + VXLAN causes 100% cross-node packet loss
# Tested: MTU=1370, devices="en+" - still broken
# Next: Try native routing mode instead of VXLAN tunnel
#
# encryption:
#   enabled: true
#   type: wireguard
#   nodeEncryption: false

# =============================================================================
# Native Routing for Nebula Mesh Network
# =============================================================================
# Reference: https://docs.cilium.io/en/stable/network/concepts/routing/#native-routing
#
# Traffic to the Nebula CIDR (10.100.0.0/16) bypasses Cilium's eBPF datapath
# and is routed natively by the kernel to the nebula0 TUN interface.
# This enables cross-cluster pod-to-pod connectivity via Nebula overlay.
#
# Without this, Cilium's eBPF intercepts Nebula-bound traffic but can't
# route it through the TUN interface, causing connectivity failures.

ipv4NativeRoutingCIDR: "10.100.0.0/16"

# =============================================================================
# ClusterMesh for Multi-Cluster Connectivity
# =============================================================================
# Reference: https://docs.cilium.io/en/stable/network/clustermesh/clustermesh/
#
# Enables cross-cluster service discovery and pod-to-pod connectivity
# across talos-home (ID:1) and aws-lighthouse (ID:2) clusters via Nebula mesh

clustermesh:
  useAPIServer: true
  apiserver:
    # SCALED TO 0 — 2026-05-29.
    # ClusterMesh is provisioned (certs, NodePort, TLS SANs) but no peer
    # cluster is registered yet (`enable-external-workloads=false`).
    # Running its 3 containers (etcd + apiserver + kvstoremesh) pinned to the
    # control-plane was load that contributed to the CP meltdowns.
    # Restore to `replicas: 1` once the AWS lighthouse peer is actually wired
    # up. Tracked: TALOS-fed-enable (re-enable ClusterMesh on federation cut-in)
    replicas: 0
    service:
      type: NodePort
      nodePort: 32379
    tls:
      auto:
        enabled: true
        method: helm
      # Include additional IPs for cross-cluster connectivity via port forwarders
      # These IPs will be included in the server certificate SANs
      # Must include all IPs that clients connect to (including forwarded IPs)
      server:
        extraIpAddresses:
          - 192.168.1.54   # Talos control plane LAN IP
          - 10.100.0.1     # Talos Nebula mesh IP
          - 10.100.2.1     # AWS Nebula mesh IP (clients connect via AWS forwarder)
    # Pin ClusterMesh API server to control plane node (has Nebula)
    # This ensures the NodePort 32379 is accessible via Nebula IP (10.100.0.1)
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
    # Tolerate control-plane taint to actually schedule on the control plane
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
