---
# PodMonitor for Flux controllers — scrapes the http-prom port (8080) on
# kustomize-controller, helm-controller, source-controller, and
# notification-controller pods.
#
# Why this exists: without it, Grafana's Flux dashboards show "No data"
# because the controllers' /metrics endpoints aren't exposed via Service
# (Service ports only include the API surface, not http-prom).
#
# Filed 2026-05-30 as part of TALOS-234 cleanup, after metrics pipeline
# was restored post-meltdown.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: flux-system
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: flux
    app.kubernetes.io/component: monitoring
spec:
  namespaceSelector:
    matchNames:
      - flux-system
  selector:
    matchLabels:
      app.kubernetes.io/part-of: flux
  podMetricsEndpoints:
    - port: http-prom
      path: /metrics
      interval: 30s
      relabelings:
        # Surface the controller component as the `controller` label so
        # Grafana dashboards can filter without parsing the pod name.
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          targetLabel: controller
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
