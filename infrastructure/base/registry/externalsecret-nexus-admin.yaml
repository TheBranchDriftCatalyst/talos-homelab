---
# Nexus admin credentials synced from 1Password.
#
# Sources from a 1Password item titled "nexus-admin" with two fields:
#   - username (value: panda)
#   - password (value: turbopookipanda)
#
# Produces a plain Opaque Secret in the registry namespace with keys
# `username` and `password` that anything in-cluster can mount or reference.
# Consumers in other namespaces should either define their own ExternalSecret
# pointing at the same 1Password item, or use a ClusterExternalSecret to
# replicate this Secret across namespaces.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexus-admin
  namespace: registry
  labels:
    app: nexus
    app.kubernetes.io/component: registry
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nexus-admin
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: nexus-admin
        property: username
    - secretKey: password
      remoteRef:
        key: nexus-admin
        property: password
