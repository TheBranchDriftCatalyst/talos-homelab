---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 24h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: traefik
      version: '>=37.0.0 <38.0.0' # Lock to v37.x (Traefik v3.5.x)
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
      interval: 12h

  install:
    crds: Create
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    # Global settings
    deployment:
      kind: DaemonSet # Use DaemonSet for hostPort binding
      replicas: 1

    # HostPort rollout fix: terminate all old pods before starting new
    # ones. `maxSurge: 1` (the chart default) tries to schedule a new
    # pod alongside the existing one on the same node, which always
    # fails with a hostPort collision on 80/443, so every port-change
    # rollout gets stuck.
    # NOTE: the helm chart reads `updateStrategy` at the TOP LEVEL,
    # not under `deployment:` — nesting it there silently falls back
    # to the chart defaults. See:
    # https://github.com/traefik/traefik-helm-chart/blob/v37.4.0/traefik/values.yaml
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0

    # Service configuration
    service:
      enabled: true
      type: ClusterIP

    # Ports configuration
    ports:
      web:
        port: 80
        exposedPort: 80
        protocol: TCP
        hostPort: 80 # Bind to host port 80
      websecure:
        port: 443
        exposedPort: 443
        protocol: TCP
        hostPort: 443 # Bind to host port 443
      traefik:
        port: 9000
        exposedPort: 9000
        protocol: TCP
      metrics:
        port: 9100
        exposedPort: 9100
        protocol: TCP
      # VPN proxy entrypoints
      socks:
        port: 1080
        exposedPort: 1080
        protocol: TCP
        hostPort: 1080
        expose:
          default: true
      httpproxy:
        port: 8080
        exposedPort: 8080
        protocol: TCP
        hostPort: 8080
        expose:
          default: true
      # Neo4j Bolt entrypoint — terminates raw Bolt TCP at 7687 for
      # catalyst-data's Neo4j Browser ingress (IngressRouteTCP). Without this,
      # http://neo4j.talos00 can load the browser SPA but queries over Bolt fail.
      bolt:
        port: 7687
        exposedPort: 7687
        protocol: TCP
        hostPort: 7687
        expose:
          default: true
      # Cowrie honeypot — removed from Traefik, using hostPort on deployment directly
    # Enable dashboard
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.${DOMAIN}`)
        entryPoints: ['web']

    # Enable access logs
    logs:
      general:
        level: INFO
      access:
        enabled: true

    # Providers
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
        allowExternalNameServices: true
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: false

    # Additional arguments
    additionalArguments:
      - --serversTransport.insecureSkipVerify=true # For self-signed certs
      - --api.insecure=true # Enable insecure API (homelab only)
      - --api.dashboard=true

    # Security context - needed for hostPort
    securityContext:
      capabilities:
        drop: [ALL]
        add: [NET_BIND_SERVICE]
      readOnlyRootFilesystem: false
      runAsGroup: 0
      runAsNonRoot: false
      runAsUser: 0

    podSecurityContext:
      fsGroup: 0
      runAsUser: 0
      runAsNonRoot: false

    # Resources
    resources:
      requests:
        cpu: 50m
        memory: 128Mi

    # Enable Prometheus metrics
    metrics:
      prometheus:
        enabled: true
        entryPoint: metrics
        # Enable detailed metrics labels for dashboards
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        # Request duration histogram buckets (comma-separated string)
        buckets: "0.1,0.3,1.2,5.0"
        service:
          enabled: true
        # ServiceMonitor for Alloy/Mimir (not kube-prometheus-stack)
        serviceMonitor:
          enabled: false  # We use Alloy scraping instead

    # Pod labels
    podLabels:
      app: traefik

    # Tolerations - allow scheduling on control-plane nodes
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    # Namespace
    namespaceOverride: 'traefik'
