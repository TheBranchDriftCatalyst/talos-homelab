---
# Default TLS certificate for all IngressRoutes
# Uses the Let's Encrypt wildcard certificate for *.knowledgedump.space as the
# default fallback. Additional wildcard certs are registered under
# `certificates` so Traefik can serve them via SNI for matching hostnames
# without IngressRoutes needing explicit TLS secret references.
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
spec:
  defaultCertificate:
    secretName: knowledgedump-wildcard-tls
  certificates:
    - secretName: knowledgedump-wildcard-tls
    - secretName: kelsboi-wildcard-tls
