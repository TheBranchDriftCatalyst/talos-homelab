---
# IngressRoute for Alloy OTLP HTTP endpoint
# Allows Claude Code on Mac to send telemetry to cluster
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alloy-otlp
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Alloy"
    gethomepage.dev/description: "OpenTelemetry Collector"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/weight: "10"
    gethomepage.dev/icon: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/grafana.png"
    gethomepage.dev/href: "http://alloy.talos00"
    gethomepage.dev/siteMonitor: "http://alloy.monitoring.svc.cluster.local:12345/-/ready"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`otel.talos00`)
      kind: Rule
      services:
        - name: alloy
          port: 4318
---
# IngressRoute for Mimir (Prometheus-compatible API)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mimir
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`mimir.talos00`)
      kind: Rule
      services:
        - name: mimir-nginx
          port: 80
---
# IngressRoute for Tempo API (traces query)
# Note: Traces are viewed via Grafana Tempo datasource, not Jaeger UI
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tempo
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`tempo.talos00`)
      kind: Rule
      services:
        - name: tempo
          port: 3200
---
# IngressRoute for Loki (direct query access)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loki-v2
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`loki.talos00`)
      kind: Rule
      services:
        - name: loki
          port: 3100
