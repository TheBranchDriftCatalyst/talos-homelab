---
# Sync the Discord webhook URL from 1Password into the monitoring
# namespace so the Mimir Alertmanager tenant-config bootstrap Job can
# read it. Same 1Password entry as flux-system/discord-webhook — this
# is a second Kubernetes Secret sourced from the same upstream, not a
# copy of another Secret (avoids brittle cross-namespace Secret reads).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: discord-webhook
  namespace: monitoring
  labels:
    app.kubernetes.io/name: discord-webhook
    app.kubernetes.io/component: alertmanager-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: discord-webhook
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/name: discord-webhook
          app.kubernetes.io/component: alertmanager-config
      type: Opaque
  data:
    - secretKey: address
      remoteRef:
        key: flux-discord-webhook
        property: webhook_url
