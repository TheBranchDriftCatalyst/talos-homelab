---
# CronJob that pushes the templated Alertmanager config into Mimir's
# multi-tenant Alertmanager for the 'anonymous' tenant.
#
# Why a CronJob and not a one-shot Job:
#   - GitOps-safe: re-runs cheaply, converges if someone edits the
#     tenant config out-of-band via the /api/v1/alerts endpoint
#   - Idempotent: the same config yields the same PUT; Mimir ignores
#     no-op writes
#   - Auto-repairs if Mimir's alertmanager PVC is wiped or a chart
#     upgrade rolls the state
#
# Runs every 15 min. On config template or Secret change, Flux updates
# the ConfigMap/Secret and the next fire picks it up (secret is read at
# Job runtime via env var, so no restart needed).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: alertmanager-config-pusher
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager-config-pusher
    app.kubernetes.io/component: alertmanager-config
spec:
  schedule: "*/15 * * * *"
  timeZone: "Etc/UTC"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      activeDeadlineSeconds: 120
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: alertmanager-config-pusher
        spec:
          serviceAccountName: alertmanager-config-pusher
          restartPolicy: OnFailure
          containers:
            - name: push
              # curl + envsubst are both available in this image and
              # the entrypoint is /bin/sh — matches the pattern used
              # by other bootstrap Jobs in this repo (see
              # infrastructure/base/external-secrets/jobs/).
              image: alpine:3.20
              resources:
                requests:
                  cpu: 20m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              env:
                - name: DISCORD_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: discord-webhook
                      key: address
                - name: MIMIR_AM_URL
                  value: "http://mimir-alertmanager.monitoring.svc:8080/api/v1/alerts"
                - name: TENANT
                  value: "anonymous"
              volumeMounts:
                - name: template
                  mountPath: /etc/template
                  readOnly: true
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  apk add --no-cache curl gettext >/dev/null
                  echo "== $(date -u) rendering alertmanager config =="
                  envsubst < /etc/template/alertmanager.tmpl.yaml > /tmp/rendered.yaml
                  # Wrap the alertmanager_config yaml in Mimir's expected
                  # envelope: { alertmanager_config: "...", template_files: {} }
                  {
                    echo 'alertmanager_config: |'
                    sed 's/^/  /' /tmp/rendered.yaml
                    echo 'template_files: {}'
                  } > /tmp/envelope.yaml
                  echo "== $(date -u) POST to $MIMIR_AM_URL =="
                  http_code=$(curl -sS -o /tmp/resp -w '%{http_code}' \
                    -X POST \
                    -H "X-Scope-OrgID: $TENANT" \
                    -H 'Content-Type: application/yaml' \
                    --data-binary @/tmp/envelope.yaml \
                    "$MIMIR_AM_URL")
                  echo "HTTP $http_code"
                  cat /tmp/resp
                  # Mimir returns 201 for config-changed, 200 for no-op
                  case "$http_code" in
                    200|201) echo "== $(date -u) done ==" ;;
                    *) echo "unexpected status $http_code" >&2; exit 1 ;;
                  esac
          volumes:
            - name: template
              configMap:
                name: alertmanager-config-template
                items:
                  - key: alertmanager.tmpl.yaml
                    path: alertmanager.tmpl.yaml
