---
# Consolidated Monitoring Stack
# Combines V2 OTEL data plane with Grafana and exporters
# NOTE: Operators are deployed separately via monitoring-v2-operators kustomization
#       to ensure CRDs are available before data plane resources.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  # Data plane components (metrics, logs, traces)
  - mimir/
  - loki/
  - tempo/
  - alloy/         # Deployment — cluster-wide scraping + OTLP receiver
  - alloy-node/    # DaemonSet — per-node logs (kernel-capture, etc.) — TALOS-kpcap

  # Kubernetes metrics
  - kube-state-metrics/
  - node-exporter/
  - blackbox-exporter/

  # Cluster baseline alerts (filling the kube-prometheus-stack gap — TALOS-vbr)
  - baseline-alerts/

  # Mimir Alertmanager tenant config (pushes Discord routing via CronJob)
  - alertmanager-config/

  # Grafana Operator & Instances (from parent monitoring dir)
  - ../grafana-operator
  - ../grafana-instances

  # Grafana configuration
  - grafana-datasources/
  - ../grafana-dashboards

  # KubeVirt monitoring (ServiceMonitor + PrometheusRule)
  - ../../kubevirt/monitoring

  # Exporters
  - ../kasa-exporter
  - ../tdarr-exporter
  - ../pushgateway

  # Ingress
  - ingressroutes.yaml
