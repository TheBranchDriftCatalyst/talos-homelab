---
# IngressRoute for Grafana managed by grafana-operator
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/instance: "main"
    gethomepage.dev/name: "Grafana"
    gethomepage.dev/description: "Dashboards & Visualization"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/weight: "1"
    gethomepage.dev/icon: "grafana.png"
    gethomepage.dev/href: "http://grafana.talos00"
    gethomepage.dev/siteMonitor: "http://grafana-service.monitoring.svc.cluster.local:3000"
    gethomepage.dev/widget.type: "grafana"
    gethomepage.dev/widget.url: "http://grafana-service.monitoring.svc.cluster.local:3000"
    gethomepage.dev/widget.username: "{{HOMEPAGE_VAR_GRAFANA_USER}}"
    gethomepage.dev/widget.password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`grafana.talos00`)
      services:
        - name: grafana-service
          port: 3000
