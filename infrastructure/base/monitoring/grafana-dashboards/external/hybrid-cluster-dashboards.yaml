---
# GrafanaDashboard CRDs for hybrid LLM cluster monitoring
# Includes Nebula mesh, Liqo federation, and AWS resources

# Liqo Multi-Cluster Dashboard
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: liqo-overview
  namespace: monitoring
  labels:
    app.kubernetes.io/component: dashboard
    dashboard-category: hybrid-cluster
spec:
  folder: 'Hybrid Cluster'
  instanceSelector:
    matchLabels:
      dashboards: 'grafana'
  grafanaCom:
    id: 16098
  datasources:
    - inputName: 'DS_PROMETHEUS'
      datasourceName: 'Mimir'
# Note (2026-05-30): aws-ec2-instances dashboard (grafana.com id 6419)
# was REMOVED — the dashboard was unpublished from grafana.com (404).
# grafana-operator was reconcile-erroring every 30s trying to fetch it.
# We don't even have AWS CloudWatch exporter running yet, so the dashboard
# would have had no data anyway. If we add EC2 monitoring later, pick
# a currently-published dashboard or write a custom one in json/.
#
# Note: nebula-mesh-status dashboard removed - consolidated into hybrid-cluster-overview
