---
# GrafanaDashboard CRDs for ArgoCD GitOps monitoring

# ArgoCD Dashboard (Official)
# Monitors: Application sync status, health, operations
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: argocd-overview
  namespace: monitoring
  labels:
    app.kubernetes.io/component: dashboard
    dashboard-category: argocd
spec:
  folder: 'GitOps'
  instanceSelector:
    matchLabels:
      dashboards: 'grafana'
  grafanaCom:
    id: 14584
  datasources:
    - inputName: 'DS_PROMETHEUS'
      datasourceName: 'Mimir'
---
# ArgoCD Operational Dashboard
# Monitors: Controller performance, reconciliation, API server
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: argocd-operational
  namespace: monitoring
  labels:
    app.kubernetes.io/component: dashboard
    dashboard-category: argocd
spec:
  folder: 'GitOps'
  instanceSelector:
    matchLabels:
      dashboards: 'grafana'
  grafanaCom:
    id: 19993
  datasources:
    - inputName: 'DS_PROMETHEUS'
      datasourceName: 'Mimir'
---
# ArgoCD Application Dashboard
# Monitors: Individual application details
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: argocd-applications
  namespace: monitoring
  labels:
    app.kubernetes.io/component: dashboard
    dashboard-category: argocd
spec:
  folder: 'GitOps'
  instanceSelector:
    matchLabels:
      dashboards: 'grafana'
  grafanaCom:
    id: 19974
  datasources:
    - inputName: 'DS_PROMETHEUS'
      datasourceName: 'Mimir'
# Note (2026-05-30): argocd-notifications dashboard (grafana.com id 17267)
# was REMOVED — the dashboard was unpublished from grafana.com (404 on
# /api/dashboards/17267/revisions). grafana-operator was reconcile-erroring
# every 30s trying to fetch it. If we ever want notifications-controller
# metrics visualized, write a custom dashboard in json/.
