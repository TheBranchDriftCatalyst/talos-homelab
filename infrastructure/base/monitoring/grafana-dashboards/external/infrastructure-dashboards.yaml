---
# GrafanaDashboard CRDs for infrastructure monitoring
# Migrated from scripts/import-grafana-dashboards.sh

# Note (2026-05-30): node-exporter-full (grafana.com id 1860) was REMOVED.
# The dashboard's author renamed it to "Node Exporter Dashboard 20240520
# 通用JOB分组版" which is Chinese-language and uses different label
# conventions than our setup. If we want node-exporter visualization back,
# pick a stable English alternative (e.g. id 11074 by starsliao) or
# write a custom json dashboard.

# PostgreSQL Database
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: postgresql-database
  namespace: monitoring
  labels:
    app.kubernetes.io/component: dashboard
    dashboard-category: infrastructure
spec:
  folder: 'Infrastructure'
  instanceSelector:
    matchLabels:
      dashboards: 'grafana'
  grafanaCom:
    id: 9628
  datasources:
    - inputName: 'DS_PROMETHEUS'
      datasourceName: 'Mimir'
