---
# Talos Cluster Debug dashboard
# Filed 2026-05-30 as the first dashboard in the Cluster Health folder.
# Covers cluster-wide health, cilium restart trends, per-node status,
# operator health, kernel events from Loki, and an embedded
# "Is Talos misconfigured?" debugging runbook.
#
# Companion: TALOS-fa7 (epic for comprehensive Talos observability)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: talos-cluster-debug
  namespace: monitoring
  labels:
    app.kubernetes.io/component: dashboard
    dashboard-category: cluster-health
spec:
  folder: "Cluster Health"
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  configMapRef:
    name: dashboard-talos-cluster-debug
    key: talos-cluster-debug.json
