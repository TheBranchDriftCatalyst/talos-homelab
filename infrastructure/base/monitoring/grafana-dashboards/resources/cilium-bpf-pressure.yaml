---
# Cilium BPF Map Pressure dashboard.
#
# Investigates the BPF map exhaustion suspect for the recurring 2026-05-29/30
# cluster meltdowns. Pairs with PrometheusRule cilium-bpf-alerts and
# scripts/test-suspect-bpf-map-pressure.sh.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cilium-bpf-pressure
  namespace: monitoring
  labels:
    app.kubernetes.io/component: dashboard
    dashboard-category: cilium
spec:
  folder: "Networking"
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  configMapRef:
    name: dashboard-cilium-bpf-pressure
    key: cilium-bpf-pressure.json
