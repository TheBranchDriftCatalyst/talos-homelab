---
# Talos00 Memory Deep-Dive dashboard
# Sister to talos-cluster-debug.  Specifically interrogates the hypothesis
# that talos00 (single CP) memory pressure is the root cause of the
# recurring meltdowns.  Cross-links to the memory-pressure-alerts
# PrometheusRule (infrastructure/base/monitoring/v2-otel/baseline-alerts/
# memory-pressure-alerts.yaml) so a firing alert lands the operator here.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: talos00-memory-deepdive
  namespace: monitoring
  labels:
    app.kubernetes.io/component: dashboard
    dashboard-category: cluster-health
spec:
  folder: "Cluster Health"
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  configMapRef:
    name: dashboard-talos00-memory-deepdive
    key: talos00-memory-deepdive.json
