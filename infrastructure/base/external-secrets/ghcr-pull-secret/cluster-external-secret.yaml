---
# ClusterExternalSecret: one source of truth for GHCR pull credentials.
#
# Templates a `ghcr-secret` ExternalSecret (and resulting dockerconfigjson
# Secret) into every namespace carrying the label
#   ghcr-pull-secret: enabled
#
# Backed by 1Password item `github-pat` / property `credential`. Rotate the
# PAT in 1Password and every namespace picks it up within refreshInterval.
#
# To opt a namespace in:
#   kubectl label ns <name> ghcr-pull-secret=enabled
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: ghcr-secret
  labels:
    app.kubernetes.io/name: ghcr-secret
    app.kubernetes.io/component: pull-credentials
spec:
  # Name of the ExternalSecret object created in each matching namespace.
  externalSecretName: ghcr-secret
  # Label-selected namespaces. Using namespaceSelectors (plural) which is
  # the non-deprecated form in ESO v0.9+.
  namespaceSelectors:
    - matchLabels:
        ghcr-pull-secret: enabled
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: onepassword
      kind: ClusterSecretStore
    target:
      name: ghcr-secret
      creationPolicy: Owner
      deletionPolicy: Retain
      template:
        type: kubernetes.io/dockerconfigjson
        data:
          .dockerconfigjson: |
            {
              "auths": {
                "ghcr.io": {
                  "username": "thebranchdriftcatalyst",
                  "password": "{{ .token }}",
                  "auth": "{{ printf "%s:%s" "thebranchdriftcatalyst" .token | b64enc }}"
                }
              }
            }
    data:
      - secretKey: token
        remoteRef:
          key: github-pat
          property: credential
