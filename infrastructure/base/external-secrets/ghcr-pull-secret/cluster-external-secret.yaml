---
# ClusterExternalSecret: one source of truth for GHCR pull credentials.
#
# Templates a `ghcr-secret` ExternalSecret (and resulting dockerconfigjson
# Secret) into ALL non-system namespaces automatically.
#
# Backed by 1Password item `github-pat` / property `credential`. Rotate the
# PAT in 1Password and every namespace picks it up within refreshInterval.
#
# Self-healing design: opt-out via the label
#   ghcr-pull-secret=disabled
# (kube-system, flux-system, kube-public, etc. are excluded automatically).
# This eliminates the need to manually label every new namespace — workloads
# in fresh namespaces (created by Flux, ArgoCD, kubectl create) get the
# pull secret without operator intervention.
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: ghcr-secret
  labels:
    app.kubernetes.io/name: ghcr-secret
    app.kubernetes.io/component: pull-credentials
spec:
  # Name of the ExternalSecret object created in each matching namespace.
  externalSecretName: ghcr-secret
  # Distribute to all namespaces EXCEPT system namespaces and explicit opt-outs.
  namespaceSelectors:
    - matchExpressions:
        # Exclude kube-* namespaces and any namespace that opts out via label.
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
        - key: ghcr-pull-secret
          operator: NotIn
          values: [disabled]
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: onepassword
      kind: ClusterSecretStore
    target:
      name: ghcr-secret
      creationPolicy: Owner
      deletionPolicy: Retain
      template:
        type: kubernetes.io/dockerconfigjson
        data:
          .dockerconfigjson: |
            {
              "auths": {
                "ghcr.io": {
                  "username": "thebranchdriftcatalyst",
                  "password": "{{ .token }}",
                  "auth": "{{ printf "%s:%s" "thebranchdriftcatalyst" .token | b64enc }}"
                }
              }
            }
    data:
      - secretKey: token
        remoteRef:
          key: github-pat
          property: credential
