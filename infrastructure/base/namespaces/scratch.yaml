---
apiVersion: v1
kind: Namespace
metadata:
  name: scratch
  labels:
    app.kubernetes.io/part-of: scratch-stack
    # Opts this namespace into the cluster-wide ghcr-secret managed by
    # infrastructure/base/external-secrets/ghcr-pull-secret/
    ghcr-pull-secret: enabled
    # Enable Goldilocks resource recommendations
    goldilocks.fairwinds.com/enabled: 'true'
    # Allow privileged workloads (GPU access, hostPath)
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
