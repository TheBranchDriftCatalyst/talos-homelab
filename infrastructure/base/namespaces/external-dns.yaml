---
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
  labels:
    app.kubernetes.io/managed-by: flux
    # privileged required so the desec-ddns gluetun sidecar can request
    # NET_ADMIN capability to set up the WireGuard tunnel (TALOS-q1a).
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
