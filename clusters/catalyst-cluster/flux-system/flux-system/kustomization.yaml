# NOTE 2026-05-30: This inner kustomization.yaml is NEVER PROCESSED.
# The OUTER `clusters/catalyst-cluster/flux-system/kustomization.yaml`
# references `flux-system/gotk-components.yaml` as a file (not as a
# directory), so this file is dead. ALL THE PATCHES BELOW were moved to
# the outer kustomization where they actually apply.
#
# Keeping this file around so `flux bootstrap` runs in the future don't
# overwrite anything unexpected, but it has no effect on the cluster.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml

# (Moved to outer kustomization — see note above.)
# Delete Flux network policies - they break connectivity with Cilium CNI
# because Cilium doesn't recognize the Kubernetes API as an "endpoint"
patches:
  - patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-egress
        namespace: flux-system
  - patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-scraping
        namespace: flux-system
  - patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-webhooks
        namespace: flux-system

  # Throttle Flux to prevent apiserver saturation that triggers Cilium
  # liveness-probe death spirals (see 2026-05-21 + 2026-05-22 + 2026-05-29
  # incidents, docs/06-troubleshooting/2026-05-29-six-meltdowns-and-the-
  # real-good-cause.md).
  #
  # 2026-05-30 update: previously --concurrent=2 was still allowing
  # synchronized reconcile bursts every 10 min (when ~30 Kustomizations
  # all hit their interval simultaneously, 2 at a time still = a 75s
  # apiserver burst). Hypothesis: this burst causes apiserver to slow
  # enough that cilium-agent /healthz (which queries apiserver) fails
  # liveness, kubelet kills cilium, cascade follows.
  #
  # Dropping to --concurrent=1 serializes ALL reconciles. ~30
  # Kustomizations × ~5s each = ~2.5min steady stream instead of a 75s
  # peak burst. Apiserver sees flat load. Per-Kustomization latency
  # increases (worst case waits ~2.5min) but for a homelab that's fine.
  #
  # Also dropped --kube-api-qps 20 → 10 and --kube-api-burst 40 → 20 to
  # further smooth load even within a single reconcile.
  #
  # Defaults (for reference): --concurrent=4, --kube-api-qps=50, --kube-api-burst=100.
  - target:
      kind: Deployment
      name: kustomize-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --concurrent=1
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --kube-api-qps=10
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --kube-api-burst=20
  - target:
      kind: Deployment
      name: helm-controller
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --concurrent=1
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --kube-api-qps=10
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --kube-api-burst=20
