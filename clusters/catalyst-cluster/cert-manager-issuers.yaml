---
# cert-manager Issuers - ClusterIssuers and CAs
# Depends on cert-manager being fully deployed (CRDs available)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuers
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/base/cert-manager-issuers
  prune: true
  # wait: false - Don't block downstream kustomizations on Certificate health.
  # Certificates can fail/expire independently (e.g. upstream DNS-01 issues) and
  # should not cascade failures into unrelated stacks like monitoring.
  wait: false
  dependsOn:
    - name: cert-manager
    - name: external-secrets
    - name: traefik  # traefik namespace must exist (certs are created there)
