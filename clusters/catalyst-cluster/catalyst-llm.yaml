---
# ARCHIVED: Catalyst LLM stack migrated to workspace/catalyst-llm repo
# Now deployed via ArgoCD from https://github.com/TheBranchDriftCatalyst/catalyst-llm
# This Flux Kustomization is disabled.
#
# Original: Provides LLM inference via AWS worker connected through Nebula mesh
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: catalyst-llm
  namespace: flux-system
spec:
  suspend: true  # DISABLED - using ArgoCD now
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./applications/catalyst-llm
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: namespaces
    - name: storage
    - name: traefik
    # - name: nebula  # TODO: Re-enable when nebula mesh is reintegrated
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
