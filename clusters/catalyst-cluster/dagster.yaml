---
# Dagster platform - orchestration engine with K8sRunLauncher
# Includes: webserver, daemon, postgres, RBAC for per-step K8s Jobs
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dagster
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./applications/dagster
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: namespaces
    - name: storage
    - name: traefik
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
