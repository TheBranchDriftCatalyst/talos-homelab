---
# Cilium — INFRA, Flux-managed (TALOS-ocj).
#
# Activated 2026-05-30 after the identity-bloat root cause was fixed
# (TALOS-yyt). The May 29 attempt to wire this in failed because the
# Cilium DS rollout coincided with an active meltdown cascade — the new
# cilium-agent couldn't reach apiserver because Cilium itself was the path.
# With identity bloat eliminated (etcd now responsive, cilium-operator
# stable, cilium-agent restarts stopped), the previously-deferred Flux
# adoption is safe: helm release name matches existing manual install, so
# helm-controller adopts in place (no take-ownership churn), and ConfigMap
# changes propagate via cilium-agent's hot-reload (not DS roll).
#
# Originally deferred behind TALOS-arx (HA control plane) because a
# single-CP meltdown during DS roll could brick the cluster. User decided
# 2026-05-30 to ignore the HA prerequisite — with the meltdown root cause
# fixed, the DS-roll risk is acceptable.
#
# CRITICAL: prune=false. NEVER auto-prune the CNI. A misconfiguration
# could delete every Cilium-related resource and brick the cluster.
#
# wait=false: Cilium DaemonSet rollouts can take 5+ min per
# `updateStrategy.rollingUpdate.maxUnavailable: 1`. Flux would otherwise
# mark the reconcile failed and retry, compounding apiserver pressure.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/base/cilium
  prune: false  # NEVER prune the CNI
  wait: false   # don't block on DS rollout
  dependsOn:
    - name: bootstrap-crds
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: cilium
      namespace: kube-system
    - apiVersion: apps/v1
      kind: Deployment
      name: cilium-operator
      namespace: kube-system
