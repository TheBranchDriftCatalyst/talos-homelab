---
# Cilium — INFRA, designed for Flux management (TALOS-ocj).
#
# ⚠️ NOT YET WIRED INTO THE CLUSTER. This file is intentionally NOT listed
# in clusters/catalyst-cluster/flux-system/kustomization.yaml.
#
# Why deferred:
#   On 2026-05-29 (meltdown #4) we attempted to enable this Kustomization
#   after `helm upgrade --install --take-ownership` to adopt the manual
#   install. Flux's helm-controller reconciled the HelmRelease, which
#   triggered a Cilium DaemonSet rolling restart (helm changes the DS
#   pod template annotations during take-ownership). The new pod on
#   talos00 hit the chicken-and-egg from cilium#41108 (config initContainer
#   can't reach apiserver via ClusterIP because Cilium routing is being
#   replaced), apiserver became unreachable from outside, control plane
#   went dark, required force-reboot.
#
# Path to actually enable this:
#   1. TALOS-arx: 3-node HA control plane lands — a single DS-roll-induced
#      cilium agent flap on one node no longer kills the cluster.
#   2. Verify TALOS-a82 KubePrism fix OR keep direct CP IP, but with HA
#      the apiserver endpoint is resilient.
#   3. Decide on HelmRelease `interval: 24h` (instead of 30m default) so
#      Flux reconciles don't churn the DS.
#   4. Decide if `rollOutCiliumPods: false` in values.yaml is the right
#      default (currently default-false per Cilium chart) — explicitly set it.
#   5. Then add `- ../cilium.yaml` to clusters/catalyst-cluster/flux-system/
#      kustomization.yaml and commit.
#
# Until then: Cilium stays manually managed via
#   helm upgrade --install cilium cilium/cilium --version 1.16.6 \
#     -f infrastructure/base/cilium/values.yaml -n kube-system \
#     --take-ownership
#
# CRITICAL when eventually enabled: prune=false. NEVER auto-prune the
# CNI. A mistake could brick the cluster.
#
# wait=false: Cilium DaemonSet rollouts can take 5+ min per
# `updateStrategy.rollingUpdate.maxUnavailable: 1`. Flux would otherwise
# mark the reconcile failed and retry, compounding apiserver pressure.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/base/cilium
  prune: false  # NEVER prune the CNI
  wait: false   # don't block on DS rollout
  dependsOn:
    - name: bootstrap-crds
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: cilium
      namespace: kube-system
    - apiVersion: apps/v1
      kind: Deployment
      name: cilium-operator
      namespace: kube-system
