# Machine config patch to expose /var/lib/rancher/local-path-provisioner to kubelet
# Required for Talos kubelet to mount local-path PVs (both static and dynamic).
# Without this, kubelet's container view doesn't include /var/lib/rancher and
# hostPath mounts fail with "is not a directory" even though the path exists on /var.
#
# Apply via the bootstrap helper script (preferred, idempotent across all nodes):
#   ./scripts/bootstrap-talos-patches.sh
#
# Or manually for a single node:
#   talosctl --talosconfig configs/talosconfig -e 192.168.1.54 \
#     patch mc --nodes <node-ip> --patch @docs/05-runbooks/talos-kubelet-localpath-patch.yaml
machine:
  kubelet:
    extraMounts:
      - destination: /var/lib/rancher
        type: bind
        source: /var/lib/rancher
        options:
          - bind
          - rshared
          - rw
