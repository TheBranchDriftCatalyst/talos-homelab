---
# LiteLLM PGVector Service
# OpenAI-compatible vector store endpoints using PGVector
# https://github.com/BerriAI/litellm-pgvector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-pgvector
  labels:
    app: litellm-pgvector
    app.kubernetes.io/name: litellm-pgvector
    app.kubernetes.io/part-of: catalyst-llm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: litellm-pgvector
  template:
    metadata:
      labels:
        app: litellm-pgvector
        app.kubernetes.io/name: litellm-pgvector
    spec:
      containers:
        - name: pgvector
          image: ghcr.io/berriai/litellm-pgvector:latest
          imagePullPolicy: Always
          env:
            # Database connection (same postgres as LiteLLM)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: database-url
            # API key for authenticating requests to this service
            - name: SERVER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key
            # LiteLLM proxy for embeddings (primary: OpenAI)
            - name: EMBEDDING__MODEL
              value: "text-embedding-3-small"
            - name: EMBEDDING__BASE_URL
              value: "http://litellm:4000"
            - name: EMBEDDING__API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key
            - name: EMBEDDING__DIMENSIONS
              value: "1536"
            # Server config
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-pgvector
  labels:
    app: litellm-pgvector
    app.kubernetes.io/name: litellm-pgvector
    app.kubernetes.io/part-of: catalyst-llm
spec:
  selector:
    app: litellm-pgvector
  ports:
    - port: 8000
      targetPort: 8000
      name: http
