---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: catalyst-llm

resources:
  - namespace.yaml
  - pvc.yaml
  - configmap.yaml
  - service.yaml
  - ingressroute.yaml
  # Ollama model config
  - ollama-models-configmap.yaml
  # Local ollama on talos06 (always-on fallback)
  - ollama-talos06.yaml
  # UI applications
  - apps/open-webui.yaml
  - apps/sillytavern.yaml
  - apps/lobe-chat.yaml
  - apps/searxng.yaml
  # LiteLLM - OpenAI-compatible proxy for all LLM providers
  - litellm/
  # OpenClaw - AI personal assistant gateway
  - openclaw/
