---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vpn-service

resources:
  - namespace.yaml
  - externalsecret.yaml

configMapGenerator:
  - name: ddns-scripts
    files:
      - scripts/ddns-manager.sh
    options:
      disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/part-of: vpn-service
