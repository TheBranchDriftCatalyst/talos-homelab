---
# ExternalSecret for DuckDNS token (from 1Password)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: duckdns-credentials
  labels:
    app.kubernetes.io/part-of: vpn-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: duckdns-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: vpn-service
  data:
    - secretKey: DUCKDNS_TOKEN
      remoteRef:
        key: duckdns
        property: token
    - secretKey: DUCKDNS_DOMAINS
      remoteRef:
        key: duckdns
        property: domains
---
# ExternalSecret for ProtonVPN credentials (reuse existing 1Password item)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: protonvpn-credentials
  labels:
    app.kubernetes.io/part-of: vpn-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: protonvpn-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: vpn-service
  dataFrom:
    - extract:
        key: protonvpn-wireguard
