---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: congress-data
  namespace: congress-gov
  labels:
    app: congress-data
    app.kubernetes.io/name: congress-data
    app.kubernetes.io/part-of: congress-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: congress-data
  template:
    metadata:
      labels:
        app: congress-data
        app.kubernetes.io/name: congress-data
    spec:
      containers:
        - name: code-server
          image: congress-data:latest
          ports:
            - name: grpc
              containerPort: 4000
              protocol: TCP
          env:
            - name: CONGRESS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: congress-data-secrets
                  key: CONGRESS_API_KEY
            - name: DAGSTER_CURRENT_IMAGE
              value: congress-data:latest
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 30
