apiVersion: v1
kind: ConfigMap
metadata:
  name: poisonarr-config
  namespace: poisonarr
data:
  config.yaml: |
    # LLM Settings
    litellm_url: "http://litellm.catalyst-llm.svc.cluster.local:4000/v1"

    # Two-model architecture
    # Navigator: Handles browser actions (smaller/faster model)
    navigator_model: "ollama/qwen2.5:14b"
    # Reasoner: Handles content understanding (larger/smarter model)
    reasoner_model: "ollama/qwen2.5:32b"

    # Legacy single model (fallback)
    model: "ollama/qwen2.5:14b"

    # Timing
    min_delay_seconds: 60
    max_delay_seconds: 300
    active_hours:
      start: "06:00"
      end: "23:00"
    timezone: "America/Los_Angeles"

    # Activity weights (probability distribution)
    activities:
      news: 25
      shopping: 20
      tech: 20
      search: 25
      social: 10

    # Browser persistence - saves cookies, sessions, login state
    browser:
      persist_sessions: true
      user_data_dir: "/data/browser"  # Mounted via PVC

    # Graph mode (LangGraph orchestration)
    graph:
      enabled: true
      checkpointing: true

    # Reflexion (self-critique on failures)
    reflexion:
      enabled: true
      max_per_session: 5
      use_reasoner_model: true  # Use 32B model for reflexion
      consecutive_failures_threshold: 2

    # Plan-and-Execute (upfront planning for known patterns)
    planning:
      enabled: true
      pattern_library_path: "/data/patterns.json"
      min_confidence: 0.8

    # Vision (screenshot analysis for fallback)
    vision:
      enabled: true
      fallback_only: true  # Only use after failures
      provider: "ollama"
      model: "llava:13b"
      base_url: "http://localhost:11434"

    # Sites per category
    sites:
      news:
        - cnn.com
        - bbc.com
        - reuters.com
        - nytimes.com
        - theguardian.com
        - apnews.com
        - npr.org
        - usatoday.com
      shopping:
        - amazon.com
        - ebay.com
        - walmart.com
        - target.com
        - bestbuy.com
        - homedepot.com
        - lowes.com
        - costco.com
      tech:
        - github.com
        - stackoverflow.com
        - news.ycombinator.com
        - reddit.com/r/programming
        - dev.to
        - medium.com
        - techcrunch.com
        - arstechnica.com
      search_engines:
        - google.com
        - duckduckgo.com
        - bing.com
      social:
        - reddit.com
        - twitter.com
        - linkedin.com
      video:
        - youtube.com
