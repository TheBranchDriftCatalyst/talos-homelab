---
# Static PV/PVC for read-only access to MeTube downloads
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-ingest-metube-downloads
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadOnlyMany
  nfs:
    server: 192.168.1.36
    path: /volume1/appdata/downloads/metube-downloads
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nfsvers=4.1
    - noatime
    - nodiratime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-ingest-metube-downloads
  namespace: media-ingest
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: media-ingest-metube-downloads
  resources:
    requests:
      storage: 10Gi
