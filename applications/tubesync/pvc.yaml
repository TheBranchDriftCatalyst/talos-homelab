---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tubesync-config
  labels:
    app: tubesync
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fatboy-nfs-appdata
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tubesync-downloads
  labels:
    app: tubesync
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fatboy-nfs-appdata
  resources:
    requests:
      storage: 10Gi
