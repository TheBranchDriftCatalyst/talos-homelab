---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tdarr
  labels:
    app: tdarr-server
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Tdarr"
    gethomepage.dev/description: "Media Transcoding"
    gethomepage.dev/group: "Media"
    gethomepage.dev/weight: "50"
    gethomepage.dev/icon: "tdarr.png"
    gethomepage.dev/href: "http://tdarr.talos00"
    gethomepage.dev/widget.type: "tdarr"
    gethomepage.dev/widget.url: "http://tdarr-server.tdarr.svc.cluster.local:8265"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`tdarr.talos00`)
      kind: Rule
      services:
        - name: tdarr-server
          port: 8265
