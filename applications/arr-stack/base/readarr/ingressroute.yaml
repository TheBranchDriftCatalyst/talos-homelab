---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: readarr
  labels:
    app: readarr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Readarr"
    gethomepage.dev/description: "Book & Audiobook Management"
    gethomepage.dev/group: "Media"
    gethomepage.dev/weight: "12"
    gethomepage.dev/icon: "readarr.png"
    gethomepage.dev/href: "http://readarr.talos00"
    gethomepage.dev/widget.type: "readarr"
    gethomepage.dev/widget.url: "http://readarr.media.svc.cluster.local:8787"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_READARR_KEY}}"
    gethomepage.dev/widget.enableQueue: "true"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`readarr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: readarr
          port: 8787
