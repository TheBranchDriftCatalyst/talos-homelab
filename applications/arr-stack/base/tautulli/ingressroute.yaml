---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tautulli
  labels:
    app: tautulli
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Tautulli"
    gethomepage.dev/description: "Plex Analytics"
    gethomepage.dev/group: "Media Streaming"
    gethomepage.dev/icon: "tautulli.png"
    gethomepage.dev/href: "http://tautulli.talos00"
    gethomepage.dev/widget.type: "tautulli"
    gethomepage.dev/widget.url: "http://tautulli.media.svc.cluster.local:8181"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_TAUTULLI_KEY}}"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`tautulli.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: tautulli
          port: 8181
