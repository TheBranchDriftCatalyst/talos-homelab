---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  labels:
    app: sonarr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Sonarr"
    gethomepage.dev/description: "TV Series Management"
    gethomepage.dev/group: "Media Management"
    gethomepage.dev/icon: "sonarr.png"
    gethomepage.dev/href: "http://sonarr.talos00"
    gethomepage.dev/widget.type: "sonarr"
    gethomepage.dev/widget.url: "http://sonarr.media.svc.cluster.local:8989"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
    gethomepage.dev/widget.enableQueue: "true"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`sonarr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: sonarr
          port: 8989
