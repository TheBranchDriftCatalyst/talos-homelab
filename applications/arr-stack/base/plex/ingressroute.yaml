---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: plex
  labels:
    app: plex
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Plex"
    gethomepage.dev/description: "Media Server"
    gethomepage.dev/group: "Media Streaming"
    gethomepage.dev/icon: "plex.png"
    gethomepage.dev/href: "http://plex.talos00"
    gethomepage.dev/widget.type: "plex"
    gethomepage.dev/widget.url: "http://plex.media.svc.cluster.local:32400"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_PLEX_KEY}}"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`plex.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: plex
          port: 32400
