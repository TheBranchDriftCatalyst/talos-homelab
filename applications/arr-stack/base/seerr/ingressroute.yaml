---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seerr
  labels:
    app: seerr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/instance: "main"
    gethomepage.dev/name: "Seerr"
    gethomepage.dev/description: "Media Requests"
    gethomepage.dev/group: "Media"
    gethomepage.dev/weight: "21"
    gethomepage.dev/icon: "overseerr.png"
    gethomepage.dev/href: "http://seerr.talos00"
    gethomepage.dev/siteMonitor: "http://seerr.media.svc.cluster.local:5055"
    # widget.type stays "overseerr" — seerr's API is compatible and
    # homepage doesn't ship a dedicated seerr widget yet.
    gethomepage.dev/widget.type: "overseerr"
    gethomepage.dev/widget.url: "http://seerr.media.svc.cluster.local:5055"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_OVERSEERR_KEY}}"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`seerr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: seerr
          port: 5055
