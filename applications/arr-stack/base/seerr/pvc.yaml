---
# Config PVC - NFS storage
# NOTE: PVC name kept as "overseerr-config" (legacy) so the existing
# bound volume — containing prior overseerr settings, db, and auth —
# carries over to seerr without a manual data migration.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: overseerr-config
  labels:
    app: seerr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fatboy-nfs-appdata
  resources:
    requests:
      storage: 1Gi
