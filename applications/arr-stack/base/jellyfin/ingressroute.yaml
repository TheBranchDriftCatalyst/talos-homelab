---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  labels:
    app: jellyfin
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Jellyfin"
    gethomepage.dev/description: "Media Server (Open Source)"
    gethomepage.dev/group: "Media Streaming"
    gethomepage.dev/icon: "jellyfin.png"
    gethomepage.dev/href: "http://jellyfin.talos00"
    gethomepage.dev/widget.type: "jellyfin"
    gethomepage.dev/widget.url: "http://jellyfin.media.svc.cluster.local:8096"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
    gethomepage.dev/widget.enableBlocks: "true"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`jellyfin.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
