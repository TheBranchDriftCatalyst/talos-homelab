---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: maintainerr
  labels:
    app: maintainerr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Maintainerr"
    gethomepage.dev/description: "Media Cleanup Automation"
    gethomepage.dev/group: "Media"
    gethomepage.dev/weight: "51"
    gethomepage.dev/icon: "maintainerr.png"
    gethomepage.dev/href: "http://maintainerr.talos00"
    gethomepage.dev/siteMonitor: "http://maintainerr.media.svc.cluster.local:80"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`maintainerr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: maintainerr
          port: 6246
