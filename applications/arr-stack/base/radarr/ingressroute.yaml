---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr
  labels:
    app: radarr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Radarr"
    gethomepage.dev/description: "Movie Management"
    gethomepage.dev/group: "Media Management"
    gethomepage.dev/icon: "radarr.png"
    gethomepage.dev/href: "http://radarr.talos00"
    gethomepage.dev/widget.type: "radarr"
    gethomepage.dev/widget.url: "http://radarr.media.svc.cluster.local:7878"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
    gethomepage.dev/widget.enableQueue: "true"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`radarr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: radarr
          port: 7878
