---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sabnzbd
  labels:
    app: sabnzbd
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "SABnzbd"
    gethomepage.dev/description: "Usenet Downloader"
    gethomepage.dev/group: "Media"
    gethomepage.dev/weight: "41"
    gethomepage.dev/icon: "sabnzbd.png"
    gethomepage.dev/href: "http://sabnzbd.talos00"
    gethomepage.dev/widget.type: "sabnzbd"
    gethomepage.dev/widget.url: "http://sabnzbd.media.svc.cluster.local:8080"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_SABNZBD_KEY}}"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`sabnzbd.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: sabnzbd
          port: 8080
