---
# ExternalSecret to pull Home Assistant long-lived access token from 1Password
# Used for Homepage Home Assistant widget API authentication
#
# Generate the token in Home Assistant: Settings > User > Long-Lived Access Tokens
# Store in 1Password item "homeassistant-token" with field "password"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homepage-homeassistant-credentials
  labels:
    app: homepage
    app.kubernetes.io/name: homepage
    app.kubernetes.io/part-of: arr-stack
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homepage-homeassistant-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        HOMEASSISTANT_TOKEN: '{{ .ha_token }}'
  data:
    - secretKey: ha_token
      remoteRef:
        key: homeassistant-token
        property: password
