---
# ExternalSecret to pull qBittorrent web UI credentials from 1Password
# Used for Homepage qBittorrent widget authentication
#
# Store in 1Password item "qbittorrent-webui" with fields "username" and "password"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homepage-qbittorrent-credentials
  labels:
    app: homepage
    app.kubernetes.io/name: homepage
    app.kubernetes.io/part-of: arr-stack
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homepage-qbittorrent-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        QBITTORRENT_USER: '{{ .username }}'
        QBITTORRENT_PASS: '{{ .password }}'
  data:
    - secretKey: username
      remoteRef:
        key: qbittorrent-webui
        property: username
    - secretKey: password
      remoteRef:
        key: qbittorrent-webui
        property: password
