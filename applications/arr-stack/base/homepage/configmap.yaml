---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  labels:
    app: homepage
    app.kubernetes.io/name: homepage
    app.kubernetes.io/part-of: arr-stack
data:
  settings.yaml: |
    ---
    # Homepage Settings Configuration
    # Documentation: https://gethomepage.dev/configs/settings/

    title: Talos Homelab Dashboard
    description: Kubernetes Media & Infrastructure Stack
    favicon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/kubernetes.png

    # Theme and appearance
    theme: dark
    color: slate
    cardBlur: sm

    # Layout configuration
    layout:
      Media:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 3
      Monitoring:
        style: row
        columns: 3
      Home & Tools:
        style: row
        columns: 4
      AI & LLM:
        style: row
        columns: 3
      VPN & Privacy:
        style: row
        columns: 3

    # Header style
    headerStyle: boxed
    iconStyle: theme

    # Display settings
    showStats: true
    statusStyle: dot
    hideVersion: false
    disableUpdateCheck: false

    # Link behavior
    target: _blank

    # Quick launch
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: duckduckgo

    # Language
    language: en

  kubernetes.yaml: |
    ---
    # Homepage Kubernetes Configuration
    # Documentation: https://gethomepage.dev/configs/kubernetes/

    # Mode: cluster (uses in-cluster service account)
    # The ServiceAccount is configured with ClusterRole permissions in serviceaccount.yaml

    mode: cluster
    traefik: true
    instance: "main"
