---
# ExternalSecret to pull Tautulli API key from 1Password
# Used for Homepage Tautulli widget API authentication
#
# Get the API key from Tautulli: Settings > Web Interface > API key
# Store in 1Password item "tautulli-api-key" with field "password"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homepage-tautulli-credentials
  labels:
    app: homepage
    app.kubernetes.io/name: homepage
    app.kubernetes.io/part-of: arr-stack
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homepage-tautulli-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        TAUTULLI_API_KEY: '{{ .tautulli_key }}'
  data:
    - secretKey: tautulli_key
      remoteRef:
        key: tautulli-api-key
        property: password
