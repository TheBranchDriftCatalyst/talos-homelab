apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ingressroute.yaml
  - deployment.yaml
  - service.yaml
  - pvc.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - configmap-services.yaml
  - grafana-credentials-externalsecret.yaml
  - argocd-api-key-externalsecret.yaml
  - plex-externalsecret.yaml
  - authentik-externalsecret.yaml
  # TODO(TALOS-e01): re-enable when 1Password items exist.
  # These ExternalSecrets block arr-stack Flux reconciliation with
  # SecretSyncedError ("could not get secret data from provider") because
  # the referenced 1P items ("homeassistant-token", "qbittorrent-webui",
  # "tautulli-api-key") haven't been created yet. Homepage env vars that
  # consume them are `optional: true` so the dashboard runs without them.
  # - homeassistant-externalsecret.yaml
  # - qbittorrent-externalsecret.yaml
  # - tautulli-externalsecret.yaml
  # NOTE: secret.yaml removed - API keys are now provided by arr-api-keys secret
  # which is auto-synced from running services via scripts/sync-api-keys.sh

labels:
  - pairs:
      app.kubernetes.io/component: dashboard
      app.kubernetes.io/part-of: arr-stack
