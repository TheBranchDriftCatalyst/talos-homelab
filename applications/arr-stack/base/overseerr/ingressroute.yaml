---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: overseerr
  labels:
    app: overseerr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Overseerr"
    gethomepage.dev/description: "Media Requests"
    gethomepage.dev/group: "Media Management"
    gethomepage.dev/icon: "overseerr.png"
    gethomepage.dev/href: "http://overseerr.talos00"
    gethomepage.dev/widget.type: "overseerr"
    gethomepage.dev/widget.url: "http://overseerr.media.svc.cluster.local:5055"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_OVERSEERR_KEY}}"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`overseerr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: overseerr
          port: 5055
