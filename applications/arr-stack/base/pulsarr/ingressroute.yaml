---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulsarr
  labels:
    app: pulsarr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Pulsarr"
    gethomepage.dev/description: "Media Sync"
    gethomepage.dev/group: "Media"
    gethomepage.dev/weight: "52"
    gethomepage.dev/icon: "pulsarr.png"
    gethomepage.dev/href: "http://pulsarr.talos00"
    gethomepage.dev/siteMonitor: "http://pulsarr.media.svc.cluster.local:80"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`pulsarr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: pulsarr
          port: 3003
