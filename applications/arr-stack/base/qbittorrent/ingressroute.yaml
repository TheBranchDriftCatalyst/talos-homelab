---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
    app.kubernetes.io/name: qbittorrent
    app.kubernetes.io/part-of: arr-stack
  annotations:
    description: "qBittorrent WebUI - VPN protected torrent client"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "qBittorrent"
    gethomepage.dev/description: "Torrent Client (VPN Protected)"
    gethomepage.dev/group: "Media"
    gethomepage.dev/weight: "40"
    gethomepage.dev/icon: "qbittorrent.png"
    gethomepage.dev/href: "http://qbittorrent.talos00"
    gethomepage.dev/widget.type: "qbittorrent"
    gethomepage.dev/widget.url: "http://qbittorrent.media.svc.cluster.local:8080"
    gethomepage.dev/widget.username: "{{HOMEPAGE_VAR_QBITTORRENT_USER}}"
    gethomepage.dev/widget.password: "{{HOMEPAGE_VAR_QBITTORRENT_PASS}}"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`qbittorrent.talos00`)
      kind: Rule
      services:
        - name: qbittorrent
          port: 8080
