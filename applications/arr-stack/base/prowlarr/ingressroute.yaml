---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr
  labels:
    app: prowlarr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Prowlarr"
    gethomepage.dev/description: "Indexer Manager"
    gethomepage.dev/group: "Media"
    gethomepage.dev/weight: "20"
    gethomepage.dev/icon: "prowlarr.png"
    gethomepage.dev/href: "http://prowlarr.talos00"
    gethomepage.dev/widget.type: "prowlarr"
    gethomepage.dev/widget.url: "http://prowlarr.media.svc.cluster.local:9696"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`prowlarr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: prowlarr
          port: 9696
