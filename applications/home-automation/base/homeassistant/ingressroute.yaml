---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homeassistant
  labels:
    app: homeassistant
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Home Assistant"
    gethomepage.dev/description: "Home Automation"
    gethomepage.dev/group: "Home"
    gethomepage.dev/icon: "home-assistant.png"
    gethomepage.dev/href: "http://homeassistant.talos00"
    gethomepage.dev/widget.type: "homeassistant"
    gethomepage.dev/widget.url: "http://home-assistant.home-automation.svc.cluster.local:8123"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_HOMEASSISTANT_KEY}}"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`homeassistant.talos00`)
      kind: Rule
      services:
        - name: homeassistant
          port: 8123
