---
# Local access (HTTP)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: litellm
  labels:
    app: litellm
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: catalyst-llm
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`litellm.talos00`)
      services:
        - name: litellm
          namespace: catalyst-llm
          port: 4000
