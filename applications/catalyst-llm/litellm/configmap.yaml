---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app: litellm
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: catalyst-llm
data:
  config.yaml: |
    model_list:
      # --- Anthropic (Claude) ---
      - model_name: "claude-sonnet-4-20250514"
        litellm_params:
          model: "anthropic/claude-sonnet-4-20250514"
          api_key: "os.environ/ANTHROPIC_API_KEY"
      - model_name: "claude-3-5-haiku-20241022"
        litellm_params:
          model: "anthropic/claude-3-5-haiku-20241022"
          api_key: "os.environ/ANTHROPIC_API_KEY"
      - model_name: "claude-opus-4-20250514"
        litellm_params:
          model: "anthropic/claude-opus-4-20250514"
          api_key: "os.environ/ANTHROPIC_API_KEY"

      # --- OpenAI (GPT) ---
      - model_name: "gpt-4o"
        litellm_params:
          model: "openai/gpt-4o"
          api_key: "os.environ/OPENAI_API_KEY"
      - model_name: "gpt-4o-mini"
        litellm_params:
          model: "openai/gpt-4o-mini"
          api_key: "os.environ/OPENAI_API_KEY"
      - model_name: "o3-mini"
        litellm_params:
          model: "openai/o3-mini"
          api_key: "os.environ/OPENAI_API_KEY"

      # --- Ollama (talos06 cluster - fallback when Mac offline) ---
      - model_name: "mistral"
        litellm_params:
          model: "ollama/mistral"
          api_base: "http://ollama.catalyst-llm.svc.cluster.local:11434"
      - model_name: "qwen2.5-coder:7b"
        litellm_params:
          model: "ollama/qwen2.5-coder:7b"
          api_base: "http://192.168.1.86:11434"
      - model_name: "hermes3:8b"
        litellm_params:
          model: "ollama/hermes3:8b"
          api_base: "http://192.168.1.86:11434"

      # --- Ollama (Mac workstation - faster inference) ---
      - model_name: "llama3.2"
        litellm_params:
          model: "ollama/llama3.2:latest"
          api_base: "http://192.168.1.86:11434"
      - model_name: "dolphin-mistral"
        litellm_params:
          model: "ollama/dolphin-mistral:7b"
          api_base: "http://192.168.1.86:11434"
      - model_name: "deepseek-r1:7b"
        litellm_params:
          model: "ollama/deepseek-r1:7b"
          api_base: "http://192.168.1.86:11434"
      - model_name: "llama3.3"
        litellm_params:
          model: "ollama/llama3.3:latest"
          api_base: "http://192.168.1.86:11434"
      - model_name: "qwen2.5:32b"
        litellm_params:
          model: "ollama/qwen2.5:32b"
          api_base: "http://192.168.1.86:11434"
      - model_name: "nous-hermes2:34b"
        litellm_params:
          model: "ollama/nous-hermes2:34b"
          api_base: "http://192.168.1.86:11434"
      - model_name: "dolphin-mixtral:8x7b"
        litellm_params:
          model: "ollama/dolphin-mixtral:8x7b"
          api_base: "http://192.168.1.86:11434"
      - model_name: "dolphin3:8b"
        litellm_params:
          model: "ollama/dolphin3:8b"
          api_base: "http://192.168.1.86:11434"
      - model_name: "llava:13b"
        litellm_params:
          model: "ollama/llava:13b"
          api_base: "http://192.168.1.86:11434"
      - model_name: "granite3.1-dense:8b"
        litellm_params:
          model: "ollama/granite3.1-dense:8b"
          api_base: "http://192.168.1.86:11434"

      # --- Embedding Models ---
      # Primary: OpenAI (high quality, low cost)
      - model_name: "text-embedding-3-small"
        litellm_params:
          model: "openai/text-embedding-3-small"
          api_key: "os.environ/OPENAI_API_KEY"
      - model_name: "text-embedding-3-large"
        litellm_params:
          model: "openai/text-embedding-3-large"
          api_key: "os.environ/OPENAI_API_KEY"

      # Fallback: Ollama local embeddings (free, runs on Mac workstation)
      - model_name: "nomic-embed-text"
        litellm_params:
          model: "ollama/nomic-embed-text"
          api_base: "http://192.168.1.86:11434"
      - model_name: "mxbai-embed-large"
        litellm_params:
          model: "ollama/mxbai-embed-large"
          api_base: "http://192.168.1.86:11434"

      # --- Custom Inference Endpoints (RunPod/EC2/vLLM) ---
      # Uncomment and configure when endpoint is ready
      #
      # RunPod Serverless:
      # - model_name: "deepseek-r1"
      #   litellm_params:
      #     model: "openai/deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"
      #     api_base: "https://api.runpod.ai/v2/<ENDPOINT_ID>/openai/v1"
      #     api_key: "os.environ/RUNPOD_API_KEY"
      #
      # EC2/Self-hosted vLLM:
      # - model_name: "deepseek-r1"
      #   litellm_params:
      #     model: "openai/deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"
      #     api_base: "http://<EC2_IP>:8000/v1"
      #     api_key: "os.environ/RUNPOD_API_KEY"  # or a different key

    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"
      database_url: "os.environ/DATABASE_URL"
      # SSO Configuration - allow both SSO and master key login
      ui_access_mode: "all"
      # Make SSO users proxy admins by default
      default_user_params:
        user_role: "proxy_admin"

    litellm_settings:
      drop_params: true

    # Vector Store Registry for RAG/Knowledge Base support
    # Uses litellm-pgvector service for OpenAI-compatible vector operations
    vector_store_registry:
      - vector_store_name: "catalyst-knowledge-base"
        litellm_params:
          # Custom provider pointing to our pgvector service
          custom_llm_provider: "openai"
          api_base: "http://litellm-pgvector:8000"
          api_key: "os.environ/LITELLM_MASTER_KEY"
          vector_store_description: "Catalyst homelab knowledge base for RAG queries"
