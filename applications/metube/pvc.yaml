---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: downloads-metube-downloads
  labels:
    app: metube
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.1.36
    path: /volume1/appdata/downloads/metube-downloads
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nfsvers=4.1
    - noatime
    - nodiratime
  claimRef:
    namespace: downloads
    name: metube-downloads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metube-downloads
  labels:
    app: metube
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: downloads-metube-downloads
  resources:
    requests:
      storage: 100Gi
