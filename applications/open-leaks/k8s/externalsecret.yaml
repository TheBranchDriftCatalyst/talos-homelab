---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dagster-s3-credentials
  namespace: open-leaks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: dagster-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: DAGSTER_S3_ENDPOINT_URL
      remoteRef:
        key: dagster-minio-s3
        property: endpoint-url
    - secretKey: DAGSTER_S3_ACCESS_KEY
      remoteRef:
        key: dagster-minio-s3
        property: access-key
    - secretKey: DAGSTER_S3_SECRET_KEY
      remoteRef:
        key: dagster-minio-s3
        property: secret-key
    - secretKey: DAGSTER_S3_BUCKET
      remoteRef:
        key: dagster-minio-s3
        property: bucket
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: open-leaks-secrets
  namespace: open-leaks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: open-leaks-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: open-leaks
        property: openai-api-key
