---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-webserver
  labels:
    app: dagster
    app.kubernetes.io/name: dagster
    app.kubernetes.io/component: webserver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dagster
      app.kubernetes.io/component: webserver
  template:
    metadata:
      labels:
        app: dagster
        app.kubernetes.io/component: webserver
    spec:
      serviceAccountName: dagster
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for dagster-postgres:5432..."
              until nc -z dagster-postgres 5432; do
                sleep 2
              done
              echo "Postgres is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: webserver
          image: dagster/dagster-k8s:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          command: ["dagster-webserver"]
          args:
            - "-h"
            - "0.0.0.0"
            - "-p"
            - "3000"
            - "-w"
            - "/dagster-workspace/workspace.yaml"
          env:
            - name: DAGSTER_HOME
              value: /opt/dagster/dagster_home
            - name: DAGSTER_POSTGRES_HOST
              value: dagster-postgres
            - name: DAGSTER_POSTGRES_PORT
              value: "5432"
            - name: DAGSTER_POSTGRES_USER
              value: dagster
            - name: DAGSTER_POSTGRES_PASSWORD
              value: dagster-homelab
            - name: DAGSTER_POSTGRES_DB
              value: dagster
          volumeMounts:
            - name: dagster-home
              mountPath: /opt/dagster/dagster_home
            - name: dagster-instance
              mountPath: /opt/dagster/dagster_home/dagster.yaml
              subPath: dagster.yaml
            - name: workspace-config
              mountPath: /dagster-workspace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /server_info
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /server_info
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: dagster-home
          persistentVolumeClaim:
            claimName: dagster-home
        - name: dagster-instance
          configMap:
            name: dagster-instance
        - name: workspace-config
          configMap:
            name: dagster-workspace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-daemon
  labels:
    app: dagster
    app.kubernetes.io/name: dagster
    app.kubernetes.io/component: daemon
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dagster
      app.kubernetes.io/component: daemon
  template:
    metadata:
      labels:
        app: dagster
        app.kubernetes.io/component: daemon
    spec:
      serviceAccountName: dagster
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for dagster-postgres:5432..."
              until nc -z dagster-postgres 5432; do
                sleep 2
              done
              echo "Postgres is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: daemon
          image: dagster/dagster-k8s:latest
          command: ["dagster-daemon"]
          args:
            - "run"
            - "-w"
            - "/dagster-workspace/workspace.yaml"
          env:
            - name: DAGSTER_HOME
              value: /opt/dagster/dagster_home
            - name: DAGSTER_POSTGRES_HOST
              value: dagster-postgres
            - name: DAGSTER_POSTGRES_PORT
              value: "5432"
            - name: DAGSTER_POSTGRES_USER
              value: dagster
            - name: DAGSTER_POSTGRES_PASSWORD
              value: dagster-homelab
            - name: DAGSTER_POSTGRES_DB
              value: dagster
          volumeMounts:
            - name: dagster-home
              mountPath: /opt/dagster/dagster_home
            - name: dagster-instance
              mountPath: /opt/dagster/dagster_home/dagster.yaml
              subPath: dagster.yaml
            - name: workspace-config
              mountPath: /dagster-workspace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["dagster-daemon", "liveness-check"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
          readinessProbe:
            exec:
              command: ["dagster-daemon", "liveness-check"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 15
      volumes:
        - name: dagster-home
          persistentVolumeClaim:
            claimName: dagster-home
        - name: dagster-instance
          configMap:
            name: dagster-instance
        - name: workspace-config
          configMap:
            name: dagster-workspace
