---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dagster
  labels:
    app: dagster
    app.kubernetes.io/name: dagster
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dagster
  labels:
    app: dagster
    app.kubernetes.io/name: dagster
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dagster
  labels:
    app: dagster
    app.kubernetes.io/name: dagster
subjects:
  - kind: ServiceAccount
    name: dagster
    namespace: dagster
roleRef:
  kind: ClusterRole
  name: dagster
  apiGroup: rbac.authorization.k8s.io
