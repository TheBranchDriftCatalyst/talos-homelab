---
# NFS volume bindings in dagster namespace for K8sRunLauncher Jobs.
# Separate PVs are needed because K8s PV:PVC binding is 1:1.
# These point to the same NFS paths as the media-ingest namespace PVs.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: dagster-metube-downloads
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadOnlyMany
  nfs:
    server: 192.168.1.36
    path: /volume1/appdata/downloads/metube-downloads
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nfsvers=4.1
    - noatime
    - nodiratime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-ingest-metube-downloads
  namespace: dagster
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: dagster-metube-downloads
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: dagster-tubesync-downloads
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadOnlyMany
  nfs:
    server: 192.168.1.36
    path: /volume1/appdata/downloads/tubesync-downloads
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nfsvers=4.1
    - noatime
    - nodiratime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-ingest-tubesync-downloads
  namespace: dagster
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: dagster-tubesync-downloads
  resources:
    requests:
      storage: 10Gi
