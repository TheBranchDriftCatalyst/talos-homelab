---
# Zipline - Self-hosted image/file sharing
# https://github.com/diced/zipline
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipline
  labels:
    app: zipline
    app.kubernetes.io/name: zipline
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zipline
  template:
    metadata:
      labels:
        app: zipline
    spec:
      containers:
        # PostgreSQL database
        - name: postgres
          image: postgres:15-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: zipline
            - name: POSTGRES_PASSWORD
              value: zipline
            - name: POSTGRES_DB
              value: zipline
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # Zipline application
        - name: zipline
          image: ghcr.io/diced/zipline:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Core configuration
            - name: CORE_SECRET
              value: "catalyst-zipline-secret-key-32ch"
            - name: DATABASE_URL
              value: "postgresql://zipline:zipline@localhost:5432/zipline"
            # Website configuration
            - name: WEBSITE_TITLE
              value: "Catalyst Share"
          volumeMounts:
            - name: uploads
              mountPath: /zipline/uploads
            - name: public
              mountPath: /zipline/public
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: zipline-postgres
        - name: uploads
          persistentVolumeClaim:
            claimName: zipline-uploads
        - name: public
          emptyDir: {}
