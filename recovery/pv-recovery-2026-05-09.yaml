---
# PV recovery manifest — 2026-05-09 UPS fault incident
# 32 surviving local-path PVCs across 4 worker nodes (talos00 EPHEMERAL was
# wiped). Each PV uses claimRef pre-binding so when GitOps redeploys the
# owning workload its PVC binds to existing data.
# Reclaim policy: Retain — manual cleanup if no longer needed.
# Storage class: local-path (must exist before these PVs bind).
# See: TALOS-asv (incident retro)

